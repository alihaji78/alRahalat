    // ====== Open Folder ======
    async function openFolder(folderId, folderName, isRootLevel = false, skipHistory = false) {
        hideToastNow();
        // أغلق الـ lightbox لو مفتوح
        const lb = document.getElementById('lightbox');
        if (lb.classList.contains('active')) { lb.classList.remove('active'); document.body.style.overflow = ''; }
 
        currentFolderId   = folderId;
        currentFolderName = folderName;
 
        if (isRootLevel) {
            navigationPath = [{ id: folderId, name: folderName }];
            document.querySelectorAll('.folder-item, .sidebar-sub-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`folder-${folderId}`)?.classList.add('active');
        } else {
            navigationPath.push({ id: folderId, name: folderName });
            document.querySelectorAll('.sidebar-sub-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tree-node-${folderId}`)?.classList.add('active');
        }
 
        if (!skipHistory) history.pushState({ type: 'folder', path: [...navigationPath] }, folderName, `#${encodeURIComponent(folderName)}`);
 
        selectionMode = false; selectedImages.clear(); updateSelectionUI();
        if (window.innerWidth <= 768) closeSidebar();
 
        // إعادة تعيين الفرز والعرض
        currentSort = 'newest';
        document.querySelectorAll('.btn-sort-opt').forEach(el => el.classList.toggle('active', el.dataset.sort === 'newest'));
 
        document.getElementById('defaultEmptyState').classList.add('hidden-el');
        renderBreadcrumb();
        document.getElementById('breadcrumb').classList.remove('hidden-el');
        document.getElementById('contentHeader').classList.remove('hidden-el');
        document.getElementById('folderActionsBar').classList.remove('hidden-el');
        document.getElementById('currentFolderName').innerText = folderName;
        document.getElementById('currentFolderCount').innerText = 'جاري التحميل...';
        document.getElementById('imageFilter').value = '';
        document.getElementById('imageFilter').value = '';
        const subFolderFilter = document.getElementById('subFolderFilter');
        if (subFolderFilter) subFolderFilter.value = '';
        document.getElementById('subFoldersSection').classList.add('hidden-el');
        document.getElementById('imagesSection').classList.remove('hidden-el');
        document.getElementById('filterBar').classList.add('hidden-el');
 
        showSkeletonLoader();
 
        try {
            const files = await fetchAllFilesInFolder(folderId, 'files(id,name,mimeType,createdTime)', 'folder,name');
            currentSubFolders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
            subFolderCounts = {};
            filteredSubFolders = [...currentSubFolders];
            currentImages     = files.filter(f => f.mimeType?.startsWith('image/')).sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime));
            filteredImages    = [...currentImages];
            visibleImagesCount = Math.min(IMAGES_PAGE_SIZE, filteredImages.length);
            renderContent();
        } catch (e) {
            document.getElementById('displayArea').innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">حدث خطأ</div><div>تعذر تحميل المحتوى. حاول مرة أخرى.</div></div>';
            document.getElementById('currentFolderCount').innerText = 'خطأ في التحميل';
        }
    }
 
    // ====== Breadcrumb ======
    function renderBreadcrumb() {
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = '';
        const homeBtn = document.createElement('button');
        homeBtn.className = 'breadcrumb-item'; homeBtn.onclick = goHome;
        homeBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>الرئيسية`;
        bc.appendChild(homeBtn);
        navigationPath.forEach((level, i) => {
            const sep = document.createElement('span'); sep.className = 'breadcrumb-separator'; sep.innerHTML = '‹'; bc.appendChild(sep);
            const item = document.createElement('button'); item.className = 'breadcrumb-item';
            if (i === navigationPath.length - 1) item.classList.add('current');
            else item.onclick = () => navigateToPath(i);
            item.innerText = level.name;
            bc.appendChild(item);
        });
    }
 
    function navigateToPath(index, skipHistory = false) {
        const target = navigationPath[index];
        navigationPath = navigationPath.slice(0, index);
        openFolder(target.id, target.name, index === 0, skipHistory);
    }
 
    function goHome(skipHistory = false) {
        const lb = document.getElementById('lightbox');
        if (lb.classList.contains('active')) { lb.classList.remove('active'); document.body.style.overflow = ''; }
        hideToastNow();
        navigationPath = []; currentFolderId = null; currentFolderName = '';
        currentImages = []; currentSubFolders = []; filteredImages = [];
        selectionMode = false; selectedImages.clear();
        document.querySelectorAll('.folder-item, .sidebar-sub-item').forEach(el => el.classList.remove('active'));
        ['breadcrumb','contentHeader','filterBar','folderActionsBar','subFoldersSection','imagesSection'].forEach(id => {
            const el = document.getElementById(id); if (el) el.classList.add('hidden-el');
        });
        document.getElementById('defaultEmptyState').classList.remove('hidden-el');
        const cached = getCachedMemories();
        if (cached) renderMemories(cached.memories, cached.allImages);
        else loadMemories();
        if (!skipHistory) history.pushState({ type: 'home' }, '', window.location.pathname);
    }
 
    // ====== Browser history ======
    window.addEventListener('popstate', (event) => {
        hideToastNow();
        const state = event.state;
        const lb = document.getElementById('lightbox');
        const lbOpen = lb.classList.contains('active');
        const newType = state?.type || 'home';
        if (lbOpen && newType !== 'lightbox') {
            lb.classList.remove('active'); document.body.style.overflow = '';
            if (newType === 'folder' && navigationPath.length > 0) return;
            if (newType === 'home' && navigationPath.length === 0) return;
        }
        if (newType === 'home') { if (navigationPath.length > 0 || lbOpen) goHome(true); }
        else if (newType === 'folder' && state.path?.length > 0) {
            const path = state.path; navigationPath = path.slice(0, -1);
            const last = path[path.length - 1];
            openFolder(last.id, last.name, path.length === 1, true);
        }
    });
 
    // ====== Skeleton ======
    function showSkeletonLoader() {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const s = document.createElement('div'); s.className = 'skeleton-card';
            s.innerHTML = '<div class="skeleton-img"></div><div class="skeleton-info"><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';
            area.appendChild(s);
        }
    }
 
    // ====== Render Content ======
    function renderContent() {
        const hasSub = currentSubFolders.length > 0;
        const hasImg = currentImages.length > 0;
        let countText = hasSub && hasImg ? `${formatCountEn(currentSubFolders.length)} مجلد، ${formatCountEn(currentImages.length)} صورة`
                      : hasSub ? `${formatCountEn(currentSubFolders.length)} مجلد فرعي`
                      : hasImg ? `${formatCountEn(currentImages.length)} صورة`
                      : 'مجلد فارغ';
        document.getElementById('currentFolderCount').innerText = countText;
 
        document.getElementById('subFoldersSection').classList.toggle('hidden-el', !hasSub);
        if (hasSub) renderSubFolders();
 
        if (hasImg) {
            document.getElementById('imagesSection').classList.remove('hidden-el');
            document.getElementById('filterBar').classList.remove('hidden-el');
            document.getElementById('folderActionsBar').classList.remove('hidden-el');
            renderImagesGrid();
        } else {
            document.getElementById('filterBar').classList.add('hidden-el');
            document.getElementById('folderActionsBar').classList.add('hidden-el');
            if (!hasSub) {
                document.getElementById('imagesSection').classList.remove('hidden-el');
                document.getElementById('displayArea').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-title">مجلد فارغ</div><div>هذا المجلد لا يحتوي على أي محتوى</div></div>';
            } else {
                document.getElementById('imagesSection').classList.add('hidden-el');
            }
        }
 
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
 
    // ====== SubFolders ======
    function renderSubFolders() {
        const grid = document.getElementById('subFoldersGrid');
        grid.innerHTML = '';
        grid.classList.toggle('list-view', currentSubFolderView === 'list');
        const query = document.getElementById('subFolderFilter')?.value.trim() || '';
        const source = query ? filteredSubFolders : currentSubFolders;
        if (source.length === 0) {
            grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔎</div><div class="empty-state-title">لا توجد مجلدات مطابقة</div><div>جرّب كلمة بحث مختلفة</div></div>';
            return;
        }
        source.forEach((folder, i) => {
            const card = document.createElement('div');
            card.className = 'folder-card';
            card.style.animationDelay = `${Math.min(i * 40, 400)}ms`;
            card.onclick = () => openFolder(folder.id, folder.name, false);
            const cachedCount = subFolderCounts[folder.id] || '...';
            card.innerHTML = `<span class="folder-card-icon">📁</span><div class="folder-card-name">${escapeHtml(folder.name)}</div><span class="folder-card-count" id="subcount-${folder.id}">${cachedCount}</span>`;
            grid.appendChild(card);
            if (!subFolderCounts[folder.id]) updateSubFolderCount(folder.id);
        });
    }
 
    async function updateSubFolderCount(folderId) {
        try {
            const files   = await fetchAllFilesInFolder(folderId, 'files(id,mimeType)');
            const el      = document.getElementById(`subcount-${folderId}`);
            if (!el) return;
            const images  = files.filter(f => f.mimeType?.startsWith('image/')).length;
            const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder').length;
            const countText = folders > 0 && images > 0 ? `${formatCountEn(folders)} مجلد، ${formatCountEn(images)} صورة`
                            : folders > 0 ? `${formatCountEn(folders)} مجلد`
                            : images  > 0 ? `${formatCountEn(images)} صورة`
                            : 'فارغ';
            subFolderCounts[folderId] = countText;
            el.innerText = countText;
        } catch (e) {}
    }
 
    // ====== Images Grid ======
    function getVisibleImages() {
        return filteredImages.slice(0, visibleImagesCount);
    }
    function updateLoadMoreUI() {
        const wrap = document.getElementById('loadMoreWrap');
        const status = document.getElementById('loadMoreStatus');
        const btn = document.getElementById('loadMoreBtn');
        if (!wrap || !status || !btn) return;
        const shown = Math.min(visibleImagesCount, filteredImages.length);
        const total = filteredImages.length;
        status.innerText = `المعروض ${formatCountEn(shown)} من ${formatCountEn(total)}`;
        const hasMore = shown < total;
        wrap.classList.toggle('hidden-el', total === 0);
        btn.classList.toggle('hidden-el', !hasMore);
    }
    function loadMoreImages() {
        if (visibleImagesCount >= filteredImages.length) return;
        visibleImagesCount = Math.min(visibleImagesCount + IMAGES_PAGE_SIZE, filteredImages.length);
        renderImagesGrid();
    }
    function renderImagesGrid() {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        area.classList.toggle('list-view', currentView === 'list');
        const visibleImages = getVisibleImages();

        title.innerText = filteredImages.length !== currentImages.length
            ? `🖼️ الصور (${formatCountEn(filteredImages.length)} من ${formatCountEn(currentImages.length)})`
            : `🖼️ الصور (${formatCountEn(currentImages.length)})`;
 
        if (filteredImages.length === 0) {
            if (currentImages.length > 0)
                area.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">لا توجد نتائج</div><div>لم نعثر على صور تطابق بحثك</div></div>';

                <div class="img-checkbox ${selectedImages.has(p.id) ? 'active' : ''}" onclick="event.stopPropagation();toggleSelection('${p.id}')">

                </div>

                    <div class="img-overlay">
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"/></svg>
                            عرض بالحجم الكامل
                        </span>
                    </div>
                </div>
                <div class="img-info">
                    <div class="img-meta">
                        <span class="img-name">${escapeHtml(p.name)}</span>
                        ${dateStr ? `<div class="img-date"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}</div>` : ''}
                        ${favoriteImages.has(p.id) ? '<div class="img-favorite-badge">⭐ مفضلة</div>' : ''}
                    </div>

    // ====== Selection ======
    function handleImageClick(id, index) {
        if (selectionMode) toggleSelection(id);
        else openLightbox(index);
    }
 
    function toggleSelectionMode() {
        selectionMode = !selectionMode;
        updateSelectionUI();
    }
 
    function updateSelectionUI() {
        const area = document.getElementById('displayArea');
        const selectBtnText = document.getElementById('folderSelectBtnText');
        const downloadBtn   = document.getElementById('downloadSelectedBtn');
        const downloadText  = document.getElementById('downloadSelectedText');

        if (selectionMode) {
            area.classList.add('selection-mode');
            if (selectBtnText) selectBtnText.innerText = 'إلغاء';
        } else {
            area.classList.remove('selection-mode');
            if (selectBtnText) selectBtnText.innerText = 'تحديد';
            selectedImages.clear();
            document.querySelectorAll('.image-card').forEach(c => c.classList.remove('selected'));
            document.querySelectorAll('.img-checkbox').forEach(c => c.classList.remove('active'));
        }

        if (selectedImages.size > 0) {
            if (downloadBtn) downloadBtn.classList.remove('hidden-el');
            if (downloadText) downloadText.innerText = `تنزيل المحدد (${formatCountEn(selectedImages.size)})`;
        } else {
            if (downloadBtn) downloadBtn.classList.add('hidden-el');
        }
    }

    function toggleSelection(id) {
        if (!selectionMode) {
            selectionMode = true;
            document.getElementById('displayArea').classList.add('selection-mode');
            const sbt = document.getElementById('folderSelectBtnText');
            if (sbt) sbt.innerText = 'إلغاء';
        }
        const card = document.querySelector(`.image-card[data-id="${id}"]`);
        if (!card) return;
        const cb = card.querySelector('.img-checkbox');
        if (selectedImages.has(id)) { selectedImages.delete(id); card.classList.remove('selected'); cb.classList.remove('active'); }
        else { selectedImages.add(id); card.classList.add('selected'); cb.classList.add('active'); }
        updateSelectionUI();
    }
    function selectAllVisible() {
        const visible = getVisibleImages();
        if (visible.length === 0) return;
        selectionMode = true;
        visible.forEach(img => selectedImages.add(img.id));
        updateSelectionUI();
        renderImagesGrid();
        showToast(`تم تحديد ${formatCountEn(visible.length)} صورة ظاهرة`, 'success');
    }
    function clearSelectionFast() {
        if (selectedImages.size === 0 && !selectionMode) return;
        selectionMode = false;
        selectedImages.clear();
        updateSelectionUI();
        renderImagesGrid();
        showToast('تم إلغاء تحديد الصور', 'success');
    }
    async function copyCurrentFolderLink() {
        if (!currentFolderName && navigationPath.length === 0) return;
        const last = navigationPath[navigationPath.length - 1];
        const label = encodeURIComponent(last?.name || currentFolderName || 'folder');
        const link = `${window.location.origin}${window.location.pathname}#${label}`;
        try {
            const copied = await copyTextSafely(link);
            if (!copied) throw new Error('copy-failed');
            showToast('تم نسخ رابط المجلد 📋', 'success');
        } catch (_) {
            showToast('تعذر نسخ الرابط', 'error');
        }
    }
    async function refreshCurrentFolder() {
        if (!currentFolderId || !currentFolderName) {
            showToast('لا يوجد مجلد مفتوح للتحديث', 'error');
            return;
        }
        await openFolder(currentFolderId, currentFolderName, navigationPath.length <= 1, true);
        showToast('تم تحديث المحتوى', 'success');
    }
 
    // ====== Bulk Download (original files, no ZIP) ======
    async function downloadSelectedImages() {
        if (selectedImages.size === 0) { showToast('لم تحدد أي صور', 'error'); return; }
        const overlay   = document.getElementById('progressOverlay');
        const fill      = document.getElementById('progressFill');
        const ptitle    = document.getElementById('progressTitle');
        const psub      = document.getElementById('progressSubtitle');
        const imgs      = currentImages.filter(img => selectedImages.has(img.id));
        if (imgs.length === 0) { showToast('لا توجد صور صالحة للتنزيل', 'error'); return; }

        _downloadCancelled = false;
        overlay.classList.add('active');
        ptitle.innerText = '⬇️ جاري تنزيل الصور المحددة...';
        psub.innerText   = `0 من ${formatCountEn(imgs.length)}`;
        fill.style.width = '0%';
        let completed = 0;
        let failed = 0;

        for (const img of imgs) {
            if (_downloadCancelled) break;
            try {
                const directUrl = `https://drive.google.com/uc?export=download&id=${img.id}`;
                triggerDownloadFrame(directUrl);
                completed++;
            } catch (_) { failed++; }
            fill.style.width = `${((completed + failed) / imgs.length) * 100}%`;
            psub.innerText   = `${formatCountEn(completed + failed)} من ${formatCountEn(imgs.length)}`;
            await new Promise(resolve => setTimeout(resolve, 900));
        }

        if (!_downloadCancelled) {
            overlay.classList.remove('active');
            showToast(
                failed > 0
                    ? `تم إرسال تنزيل ${formatCountEn(completed)} صورة (تعذر ${formatCountEn(failed)})`
                    : `تم إرسال تنزيل ${formatCountEn(completed)} صورة بنجاح ✨`,
                failed > 0 ? 'error' : 'success'
            );
        }
        selectionMode = false;
        selectedImages.clear();
        updateSelectionUI();
        renderImagesGrid();
    }

    // ====== وضع الذكريات: الكشف ======
    function isMemoriesMode() {
        const defaultState = document.getElementById('defaultEmptyState');
        return defaultState && !defaultState.classList.contains('hidden-el');
    }

    // ====== متغيرات فرز وعرض الذكريات ======
    let memCurrentSort = 'newest';
    let memCurrentView = 'grid';
    // الصور الأصلية للتبويب النشط (لإعادة الفلترة)
    window._memOriginalTabImages = [];

    function applyMemSort(sortKey) {
        memCurrentSort = sortKey;
        document.querySelectorAll('[data-memsort]').forEach(el =>
            el.classList.toggle('active', el.dataset.memsort === sortKey));
        renderMemActivePanel();
    }

    function setMemView(view) {
        memCurrentView = view;
        document.getElementById('memViewGrid')?.classList.toggle('active', view === 'grid');
        document.getElementById('memViewList')?.classList.toggle('active', view === 'list');
        // تطبيق على كل شبكات الذكريات
        document.querySelectorAll('#memoriesContent .images-grid').forEach(g =>
            g.classList.toggle('list-view', view === 'list'));
    }

    function filterMemImages() {
        renderMemActivePanel();
    }

    function getMemFilteredSorted(images) {
        const q = (document.getElementById('memImageFilter')?.value || '').toLowerCase().trim();
        let list = q ? images.filter(img => (img.name || '').toLowerCase().includes(q)) : [...images];
        list.sort((a, b) => {
            const dateA = new Date(a.imgDate || a.createdTime || 0);
            const dateB = new Date(b.imgDate || b.createdTime || 0);
            switch (memCurrentSort) {
                case 'newest':    return dateB - dateA;
                case 'oldest':    return dateA - dateB;
                case 'name-asc':  return (a.name || '').localeCompare(b.name || '', 'ar');
                case 'name-desc': return (b.name || '').localeCompare(a.name || '', 'ar');
                default: return 0;
            }
        });
        return list;
    }

    // إعادة رسم البانل النشط بعد الفلترة/الفرز
    function renderMemActivePanel() {
        const activePanel = document.querySelector('.mem-panel-active');
        if (!activePanel) return;
        const allImgs = window._memOriginalTabImages || [];
        const filtered = getMemFilteredSorted(allImgs);
        window._memCurrentTabImagesGlobal = filtered;

        // تحديث عدد الصور في الشريط
        const folderCount = document.getElementById('currentFolderCount');
        if (folderCount) {
            folderCount.innerText = filtered.length !== allImgs.length
                ? `${formatCountEn(filtered.length)} من ${formatCountEn(allImgs.length)} صورة`
                : `${formatCountEn(filtered.length)} صورة`;
        }

        // جمع كل شبكات البانل النشط وإعادة رسمها
        const grids = activePanel.querySelectorAll('.images-grid');
        if (grids.length === 1) {
            rerenderMemGrid(grids[0], filtered);
        } else if (grids.length > 1) {
            // تبويب اليوم: شبكات متعددة (واحدة لكل سنة) - نفلتر كل شبكة بمصدرها
            grids.forEach(grid => {
                const src = grid.dataset.memSource;
                const imgs = src ? filtered.filter(img => img._memSource === src) : filtered;
                rerenderMemGrid(grid, imgs);
            });
        }
        // تطبيق selection mode لو نشط
        if (window._memSelectionMode) window._memUpdateSelUI && window._memUpdateSelUI();
    }

    function rerenderMemGrid(grid, images) {
        grid.innerHTML = '';
        grid.classList.toggle('list-view', memCurrentView === 'list');
        const panelImgsRef = images.map(img => ({ id: img.id, name: img.name }));
        images.forEach((p, i) => {
            const dateStr = p.imgDate ? `${formatCountEn(new Date(p.imgDate).getDate())} ${ARABIC_MONTHS[new Date(p.imgDate).getMonth()]}` : formatDate(p.createdTime);
            const card = document.createElement('div');
            card.className = 'image-card memory-card';
            card.dataset.memId = p.id;
            card.style.animationDelay = `${Math.min(i * 30, 300)}ms`;
            card.innerHTML = `
                ${p.imgDate ? `<div class="memory-card-badge"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${dateStr}</div>` : ''}
                <div class="img-container" onclick='openMemoryLightbox(${JSON.stringify(panelImgsRef)},${i})'>

    function renderLightboxRelated() {
        const wrap = document.getElementById('lightboxRelated');
        const strip = document.getElementById('lightboxRelatedStrip');
        if (!wrap || !strip) return;
        if (!Array.isArray(lightboxImages) || lightboxImages.length <= 1) {
            wrap.style.display = 'none';
            strip.innerHTML = '';
            return;
        }

        const current = lightboxImages[lightboxIndex] || {};
        const getMonthDay = (dateStr) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d)) return '';
            return `${d.getMonth()}-${d.getDate()}`;
        };
        const currentMD = getMonthDay(current.createdTime || current.imgDate);

        const scored = lightboxImages
            .map((it, idx) => {
                if (idx === lightboxIndex) return null;
                const md = getMonthDay(it.createdTime || it.imgDate);
                const sameMonthDay = currentMD && md && currentMD === md ? 1 : 0;
                const sameFolder = current.folderPath && it.folderPath && current.folderPath === it.folderPath ? 1 : 0;
                const distance = Math.abs(idx - lightboxIndex);
                const score = (sameMonthDay * 200) + (sameFolder * 80) - distance;
                return { idx, it, score };
            })
            .filter(Boolean)
            .sort((a, b) => b.score - a.score)
            .slice(0, 8);

        if (scored.length === 0) {
            wrap.style.display = 'none';
            strip.innerHTML = '';
            return;
        }

        strip.innerHTML = scored.map(({ idx, it }) => `
            <button class="lightbox-related-item" onclick="openRelatedLightboxImage(${idx})" title="${escapeHtml(it.name || 'صورة')}">
                <img src="https://drive.google.com/thumbnail?id=${it.id}&sz=w240" loading="lazy" alt="${escapeHtml(it.name || 'صورة')}">
            </button>
        `).join('');
        wrap.style.display = 'flex';
    }

    // Touch swipe + zoom
    let touchStartX = 0, touchStartY = 0;
    let lbScale = 1, lbTransX = 0, lbTransY = 0;
    let lbLastTap = 0;
    let pinchStartDist = 0, pinchStartScale = 1;
    let isDragging = false, dragStartX = 0, dragStartY = 0, dragStartTX = 0, dragStartTY = 0;

    function lbApplyTransform(animated = false) {
        const img = document.getElementById('lightboxImg');
        img.style.transition = animated ? 'transform 0.3s ease, opacity 0.2s ease' : 'opacity 0.2s ease';
        img.style.transform = `scale(${lbScale}) translate(${lbTransX}px, ${lbTransY}px)`;
        img.classList.toggle('zoomed', lbScale > 1);
        // تحديث زر الـ reset بنسبة التكبير
        const resetBtn = document.getElementById('lightboxZoomReset');
        if (resetBtn) resetBtn.textContent = lbScale === 1 ? '1×' : `${lbScale.toFixed(1)}×`;
    }

    function lbResetZoom(animated = true) {
        lbScale = 1; lbTransX = 0; lbTransY = 0;
        lbApplyTransform(animated);
    }

    function lbZoomIn() {
        lbScale = Math.min(5, parseFloat((lbScale * 1.4).toFixed(2)));
        lbApplyTransform(true);
    }

    function lbZoomOut() {
        lbScale = Math.max(1, parseFloat((lbScale / 1.4).toFixed(2)));
        if (lbScale <= 1.05) { lbScale = 1; lbTransX = 0; lbTransY = 0; }
        lbApplyTransform(true);
    }

    const lbEl = document.getElementById('lightbox');
    const lbBody = document.getElementById('lightbox').querySelector('.lightbox-body');

    // Double-tap / double-click to zoom
    lbEl.addEventListener('dblclick', (e) => {
        if (e.target.closest('.lightbox-nav') || e.target.closest('.lightbox-btn')) return;
        if (lbScale > 1) { lbResetZoom(); } else { lbScale = 2.5; lbApplyTransform(true); }
    });

    lbEl.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            // double-tap detection
            const now = Date.now();
            if (now - lbLastTap < 300) {
                if (lbScale > 1) lbResetZoom(); else { lbScale = 2.5; lbApplyTransform(true); }
                lbLastTap = 0;
            } else { lbLastTap = now; }
        } else if (e.touches.length === 2) {
            // pinch start
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStartDist  = Math.hypot(dx, dy);
            pinchStartScale = lbScale;
        }
    }, { passive: true });

    lbEl.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dx   = e.touches[0].clientX - e.touches[1].clientX;
            const dy   = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            lbScale = Math.min(5, Math.max(1, pinchStartScale * (dist / pinchStartDist)));
            lbApplyTransform();
        } else if (e.touches.length === 1 && lbScale > 1) {
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            lbTransX += dx / lbScale; lbTransY += dy / lbScale;
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            lbApplyTransform();
        }
    }, { passive: false });

    lbEl.addEventListener('touchend', e => {
        if (e.touches.length === 0 && lbScale === 1) {
            // swipe navigation only when not zoomed
            const diff = e.changedTouches[0].screenX - touchStartX;
            const diffY = Math.abs(e.changedTouches[0].screenY - touchStartY);
            if (Math.abs(diff) > 50 && diffY < 80) navigateLightbox(diff > 0 ? 1 : -1);
        }
        if (lbScale < 1.05) lbResetZoom(true);
    }, { passive: true });

    // Mouse wheel zoom
    lbEl.addEventListener('wheel', e => {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.85 : 1.15;
        lbScale = Math.min(5, Math.max(1, lbScale * delta));
        if (lbScale <= 1) { lbScale = 1; lbTransX = 0; lbTransY = 0; }
        lbApplyTransform();
    }, { passive: false });

    // Mouse drag when zoomed
    lbEl.addEventListener('mousedown', e => {
        if (lbScale <= 1 || e.target.closest('.lightbox-nav') || e.target.closest('.lightbox-btn')) return;
        isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
        dragStartTX = lbTransX; dragStartTY = lbTransY;
        lbBody.classList.add('dragging');
    });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        lbTransX = dragStartTX + (e.clientX - dragStartX) / lbScale;
        lbTransY = dragStartTY + (e.clientY - dragStartY) / lbScale;
        lbApplyTransform();
    });
    window.addEventListener('mouseup', () => { isDragging = false; lbBody?.classList.remove('dragging'); });
 
    // ====== Save/Share Link (Android WebView friendly) ======
    async function copyTextSafely(text) {
        if (!text) return false;
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            return true;
        }
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.top = '-1000px';
        ta.style.left = '-1000px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        let copied = false;
        try {
            copied = document.execCommand('copy');
        } catch (_) {
            copied = false;
        }
        document.body.removeChild(ta);
        return copied;
    }

    function escapeJsSingleQuote(value) {
        return String(value || '')
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/\r?\n/g, ' ');
    }

        } catch (_) {
            favoriteImages = new Set();

    function toggleFavoriteImage(imageId, imageName) {
        if (!imageId) return;

            favoriteImages.delete(imageId);
            showToast(`أزيلت "${imageName || 'الصورة'}" من المفضلة`, 'success');
        } else {

        saveFavorites();

        document.querySelectorAll('[data-menu-wrap="' + imageId + '"]').forEach(wrap => {

    async function shareImage(imageId, imageName) {
        const driveUrl = `https://drive.google.com/file/d/${imageId}/view`;
        try {
            if (navigator.share) {
                await navigator.share({
                    title: imageName || 'صورة',
                    text: imageName || 'رابط الصورة',
                    url: driveUrl
                });
                showToast(`تم فتح المشاركة لـ "${imageName || 'الصورة'}"`, 'success');
                return;
            }

            const copied = await copyTextSafely(driveUrl);
            if (!copied) throw new Error('copy-failed');
            showToast(`تم حفظ رابط "${imageName || 'الصورة'}" 📋`, 'success');
        } catch (err) {
            if (err && err.name === 'AbortError') return;
            showToast('تعذر حفظ الرابط، جرّب زر "حفظ" المباشر للصورة', 'error');
        }
    }

    // ====== Snackbar (بديل Toast — يختفي تلقائياً بعد 3 ث) ======
    let _snackTimer = null;
    function showToast(message, type = 'success') {
        const sb  = document.getElementById('snackbar');
        const ico = document.getElementById('snackbarIcon');
        const msg = document.getElementById('snackbarMsg');
        if (_snackTimer) { clearTimeout(_snackTimer); _snackTimer = null; }
        sb.className = 'snackbar ' + type;
        ico.innerHTML = type === 'success'
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
        msg.textContent = message;
        sb.classList.add('show');
        _snackTimer = setTimeout(() => {
            sb.classList.remove('show');
            _snackTimer = null;
        }, 3000);
    }
    function hideToastNow() {
        const sb = document.getElementById('snackbar');
        if (!sb) return;
        if (_snackTimer) { clearTimeout(_snackTimer); _snackTimer = null; }
        sb.classList.remove('show');
    }

    async function loadMemories() {
        updateMemoriesHeader();
        const cached = getCachedMemories();
        if (cached) { renderMemories(cached.memories, cached.allImages); return; }
        const progressEl = document.getElementById('memoriesProgress');
        try {
            progressEl.innerText = 'جاري فحص المجلدات الرئيسية...';
            const allImages = await fetchAllImagesRecursive(ROOT_FOLDER_ID, '', progressEl);
            if (allImages.length === 0) { showNoMemories('لا توجد صور حتى الآن'); return; }
            progressEl.innerText = `تم العثور على ${formatCountEn(allImages.length)} صورة، جاري تحليل التواريخ...`;
            const memories = filterMemories(allImages);
            cacheMemories(memories, allImages);
            renderMemories(memories, allImages);
        } catch (e) {
            console.error(e);

    function updateMemoriesHeader() {
        const today   = new Date();
        const dayName = ARABIC_DAYS[today.getDay()];
        document.getElementById('memoriesTitle').innerText    = 'في مثل هذا اليوم';
        document.getElementById('memoriesSubtitle').innerText = `${dayName}، ${formatCountEn(today.getDate())} ${ARABIC_MONTHS[today.getMonth()]}`;
    }
 
    async function fetchAllImagesRecursive(folderId, parentPath, progressEl) {
        let allImages = [];
        try {
            const files   = await fetchAllFilesInFolder(folderId, 'files(id,name,mimeType,createdTime,modifiedTime,imageMediaMetadata)');
            const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
            const images  = files.filter(f => f.mimeType?.startsWith('image/'));
            images.forEach(img => allImages.push({ ...img, folderPath: parentPath || 'الرئيسية', parentFolderId: folderId }));
            if (progressEl && images.length > 0)
                progressEl.innerText = `تم فحص "${parentPath || 'الرئيسية'}" - ${formatCountEn(allImages.length)} صورة حتى الآن`;
            const batchSize = 3;
            for (let i = 0; i < folders.length; i += batchSize) {
                const results = await Promise.all(
                    folders.slice(i, i + batchSize).map(f => fetchAllImagesRecursive(f.id, parentPath ? `${parentPath} › ${f.name}` : f.name, progressEl))
                );
                results.forEach(r => allImages = allImages.concat(r));
            }
        } catch (e) { console.error('Error fetching folder:', folderId, e); }
        return allImages;
    }
 
    function isDateInCurrentWeek(month, day) {
        const now = new Date();
        const currentYear = now.getFullYear();
        const start = new Date(now);
        start.setDate(now.getDate() - now.getDay());
        start.setHours(0, 0, 0, 0);
        const end = new Date(start);
        end.setDate(start.getDate() + 6);
        end.setHours(23, 59, 59, 999);
        const normalized = new Date(currentYear, month, day, 12, 0, 0, 0);
        return normalized >= start && normalized <= end;
    }
    function isDateInCurrentMonth(month) {
        const now = new Date();
        return month === now.getMonth();
    }
    function pickScatteredImages(images) {
        const byFolder = new Map();
        images.forEach(img => {
            const key = img.parentFolderId || img.folderPath || 'root';
            if (!byFolder.has(key)) byFolder.set(key, []);
            byFolder.get(key).push(img);
        });
        const picked = [];
        const randomIndex = (max) => {
            if (max <= 0) return 0;
            if (window.crypto && window.crypto.getRandomValues) {
                const arr = new Uint32Array(1);
                window.crypto.getRandomValues(arr);
                return arr[0] % max;
            }
            return Math.floor(Math.random() * max);
        };
        byFolder.forEach(list => {
            if (!list.length) return;
            const rand = randomIndex(list.length);
            picked.push(list[rand]);
        });
        return picked.sort((a, b) => new Date(b.createdTime || 0) - new Date(a.createdTime || 0));
    }
    function filterMemories(images) {
        const today       = new Date();
        const currentYear = today.getFullYear();
        const todayMonth  = today.getMonth();   // 0-11
        const todayDay    = today.getDate();    // 1-31
        const memories    = {};
        const weekMemories = [];
        const monthMemories = [];

        images.forEach(img => {
            let imgDate = null;
            if (img.imageMediaMetadata?.time) {
                imgDate = new Date(img.imageMediaMetadata.time.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1-$2-$3'));
            }
            if (!imgDate || isNaN(imgDate)) imgDate = new Date(img.createdTime);
            if (isNaN(imgDate)) return;

            const imgYear = imgDate.getFullYear();
            if (imgYear >= currentYear) return; // نستبعد هذا العام

            // نفس اليوم ونفس الشهر بالضبط
            if (imgDate.getMonth() === todayMonth && imgDate.getDate() === todayDay) {
                const yearsAgo = currentYear - imgYear;
                if (!memories[yearsAgo]) memories[yearsAgo] = [];
                memories[yearsAgo].push({ ...img, imgDate: imgDate.toISOString(), yearsAgo });
                return;
            }
            // نفس أسبوع هذا العام (مع استبعاد يوم اليوم نفسه)
            if (isDateInCurrentWeek(imgDate.getMonth(), imgDate.getDate())) {
                weekMemories.push({ ...img, imgDate: imgDate.toISOString() });
                return;
            }
            if (isDateInCurrentMonth(imgDate.getMonth())) {
                monthMemories.push({ ...img, imgDate: imgDate.toISOString() });
            }
        });

        // ترتيب الصور داخل كل سنة من الأحدث للأقدم
        Object.keys(memories).forEach(year => {
            memories[year].sort((a, b) => new Date(b.imgDate) - new Date(a.imgDate));
        });

        weekMemories.sort((a, b) => new Date(b.imgDate) - new Date(a.imgDate));
        monthMemories.sort((a, b) => new Date(b.imgDate) - new Date(a.imgDate));
        return { todayMemories: memories, weekMemories, monthMemories };
    }

    // اختيار 20 صورة عشوائية من كل الصور
    function pickRandomImages(images, count = 20) {
        const shuffled = [...images].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count);
    }

        let currentTabImages = [];

        function updateMemDownloadBar(images) {
            currentTabImages = images || [];
            window._memCurrentTabImagesGlobal = currentTabImages;
            showMemFilterBar(currentTabImages);
            window._resetMemSelection && window._resetMemSelection();
        }

        const activateMemTab = (tab) => {
            const showToday = tab === 'today';
            const showWeek = tab === 'week';
            const showScattered = tab === 'scattered';
            const showFavorites = tab === 'favorites';
            tabToday.classList.toggle('active', showToday);
            if (tabWeek) tabWeek.classList.toggle('active', showWeek);
            tabScattered.classList.toggle('active', showScattered);
            tabFavorites.classList.toggle('active', showFavorites);
            todayPanel.classList.toggle('hidden-el', !showToday);
            weekPanel.classList.toggle('hidden-el', !showWeek);
            scatteredPanel.classList.toggle('hidden-el', !showScattered);
            favoritesPanel.classList.toggle('hidden-el', !showFavorites);
            [todayPanel, weekPanel, scatteredPanel, favoritesPanel].forEach(p => p && p.classList.remove('mem-panel-active'));
            if (showToday) todayPanel.classList.add('mem-panel-active');
            else if (showWeek) weekPanel.classList.add('mem-panel-active');
            else if (showScattered) scatteredPanel.classList.add('mem-panel-active');
            else if (showFavorites) favoritesPanel.classList.add('mem-panel-active');

            if (showToday) {
                const todayList = years.reduce((a, y) => a.concat(todayMemories[y].map(img => ({ ...img, _memSource: String(y) }))), []);
                updateMemDownloadBar(todayList.length > 0 ? todayList : (window._memCurrentTabImagesGlobal || []));
            }
            else if (showWeek) updateMemDownloadBar(periodMemories);
            else if (showScattered) updateMemDownloadBar(scatteredMemories);
            else if (showFavorites) renderFavoritesPanel();
        };
        tabToday.onclick = () => activateMemTab('today');
        if (tabWeek) tabWeek.onclick = () => activateMemTab('week');
        tabScattered.onclick = () => activateMemTab('scattered');
        tabFavorites.onclick = () => activateMemTab('favorites');

        // تهيئة تبويب اليوم
        todayPanel.classList.add('mem-panel-active');
        const todayImgs = years.reduce((a, y) => a.concat(todayMemories[y].map(img => ({ ...img, _memSource: String(y) }))), []);
        updateMemDownloadBar(todayImgs);

        function renderFavoritesPanel() {
            favoritesPanel.innerHTML = '';
            const favIds = [...favoriteImages];
            const favImgs = (allImages || []).filter(img => favIds.includes(img.id));
            updateMemDownloadBar(favImgs);  // يُحدّث الشريط بصور المفضلة
            if (favImgs.length === 0) {
                favoritesPanel.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⭐</div><div class="empty-state-title">لا توجد صور في المفضلة</div><div>أضف صوراً للمفضلة من قائمة المزيد</div></div>';
                return;
            }
            const group = document.createElement('div');
            group.className = 'memory-year-group';
            group.innerHTML = `
                <div class="memory-year-header">
                    <span class="memory-year-number">⭐</span>
                    <span class="memory-year-label">صورك المفضلة</span>
                    <span class="memory-year-count">${formatCountEn(favImgs.length)} صورة</span>
                </div>
                <div class="images-grid" id="favorites-grid"></div>`;
            favoritesPanel.appendChild(group);
            const grid = group.querySelector('#favorites-grid');
            const favImgsRef = favImgs.map(img => ({ id: img.id, name: img.name, createdTime: img.createdTime }));
            favImgs.forEach((p, i) => {
                const dateStr = formatDate(p.createdTime);
                const card = document.createElement('div');
                card.className = 'image-card memory-card';
                card.dataset.memId = p.id;
                card.style.animationDelay = `${Math.min(i * 40, 400)}ms`;
                card.innerHTML = `
                    <div class="img-container" onclick='openMemoryLightbox(${JSON.stringify(favImgsRef)},${i})'>
                        <img src="https://drive.google.com/thumbnail?id=${p.id}&sz=w800" loading="lazy" alt="${escapeHtml(p.name)}" onload="this.classList.add('loaded')">
                        <div class="img-overlay">
                            <span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"/></svg>
                                عرض بالحجم الكامل
                            </span>
                        </div>
                    </div>
                    <div class="img-info">
                        <div class="img-meta">
                            <div class="img-name">${escapeHtml(p.name)}</div>
                            <div class="memory-card-folder">📁 ${escapeHtml(p.folderPath || 'مجلد')}</div>
                            ${dateStr ? `<div class="img-date"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}</div>` : ''}
                            <div class="img-favorite-badge">⭐ مفضلة</div>
                        </div>
                        ${renderImageActions({ id: p.id, name: p.name, createdTime: p.createdTime, folderPath: p.folderPath || '' }, false)}
                    </div>`;
                grid.appendChild(card);
            });
        }
    }

    function renderRandomImages(allImages, targetContent = null, append = false) {
        const content  = targetContent || document.getElementById('memoriesContent');
        const today    = new Date();
        const dayName  = ARABIC_DAYS[today.getDay()];
        if (!append) {
            document.getElementById('memoriesSubtitle').innerText = `${dayName}، ${formatCountEn(today.getDate())} ${ARABIC_MONTHS[today.getMonth()]} • لقطات عشوائية`;
            document.getElementById('memoriesTitle').innerText = '✨ لقطات من الذاكرة';
        }

        const picked  = pickRandomImages(allImages, 20);
        const memImgs = picked.map(img => ({ id: img.id, name: img.name, createdTime: img.createdTime }));

        // تحديث الصور للشريط الموحد + إظهاره
        window._memCurrentTabImagesGlobal = picked;
        window._resetMemSelection && window._resetMemSelection();
        showMemFilterBar(picked);
        // تعيين البانل النشط للتحديد
        document.querySelectorAll('.memories-tab-panel').forEach(p => p.classList.remove('mem-panel-active'));
        content.classList && content.classList.add('mem-panel-active');

        if (!append) content.innerHTML = '';
        const group = document.createElement('div');
        group.className = 'memory-year-group';
        group.innerHTML = `
            <div class="memory-year-header">
                <span class="memory-year-number">🎲</span>
                <span class="memory-year-label">لا توجد ذكريات من هذا اليوم</span>
                <span class="memory-year-count">${formatCountEn(picked.length)} صورة عشوائية</span>
            </div>
            <div class="images-grid" id="random-grid"></div>`;
        content.appendChild(group);

        const grid = group.querySelector('#random-grid');
        picked.forEach((p, i) => {
            const dateStr = formatDate(p.createdTime);
            const card    = document.createElement('div');
            card.className = 'image-card memory-card';
            card.dataset.memId = p.id;
            card.style.animationDelay = `${Math.min(i * 40, 400)}ms`;
            card.innerHTML = `
                <div class="img-container" onclick='openMemoryLightbox(${JSON.stringify(memImgs)},${i})'>
                    <img src="https://drive.google.com/thumbnail?id=${p.id}&sz=w800" loading="lazy" alt="${escapeHtml(p.name)}" onload="this.classList.add('loaded')">
                    <div class="img-overlay">
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"/></svg>
                            عرض بالحجم الكامل
                        </span>
                    </div>
                </div>
                <div class="img-info">
                    <div class="img-meta">
                        <div class="img-name">${escapeHtml(p.name)}</div>
                        ${dateStr ? `<div class="img-date"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}</div>` : ''}
                        ${favoriteImages.has(p.id) ? '<div class="img-favorite-badge">⭐ مفضلة</div>' : ''}
                    </div>
                    ${renderImageActions({ id: p.id, name: p.name, createdTime: p.createdTime, folderPath: p.folderPath || '' }, false)}
                </div>`;
            grid.appendChild(card);
        });
    }
 
    function openMemoryLightbox(images, index) {
        lightboxImages = images;
        lightboxIndex  = index;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
        updateLightbox();
        history.pushState({ type: 'lightbox', path: [] }, '', window.location.href);
    }
 
    function showNoMemories(message) {
        document.getElementById('memoriesContent').innerHTML = `
            <div class="memories-empty">
                <div class="memories-empty-icon">📷</div>
                <div class="memories-empty-title">${message}</div>
                <div class="memories-empty-text">اختر مجلد من القائمة الجانبية لتصفح الصور</div>
            </div>`;
    }
 

    // ====== دوال تحديد الذكريات (عامة - window) ======
    // state عامة للـ selection في تبويبات الذكريات
    window._memSelectedImages = new Set();
    window._memSelectionMode = false;

    window._memUpdateSelUI = function() {
        const memSelectedImages = window._memSelectedImages;
        const memSelectionMode  = window._memSelectionMode;

        const selectBtnText = document.getElementById('selectBtnText');
        const dlSelBtn      = document.getElementById('memDlSelBtn');
        const dlSelText     = document.getElementById('memDlSelText');

        if (selectBtnText) selectBtnText.textContent = memSelectionMode ? 'إلغاء' : 'تحديد';
        if (memSelectedImages.size > 0) {
            if (dlSelBtn) dlSelBtn.classList.remove('hidden-el');
            if (dlSelText) dlSelText.textContent = `تنزيل المحدد (${formatCountEn(memSelectedImages.size)})`;
        } else {
            if (dlSelBtn) dlSelBtn.classList.add('hidden-el');
        }
        // تحديث checkboxes
        document.querySelectorAll('.mem-panel-active .image-card, #memoriesContent .image-card').forEach(card => {
            const id = card.dataset.memId; if (!id) return;
            let cb = card.querySelector('.img-checkbox');
            if (!cb) {
                cb = document.createElement('div'); cb.className = 'img-checkbox';
                cb.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
                cb.onclick = (e) => { e.stopPropagation(); window.toggleMemSelection(id); };
                card.insertBefore(cb, card.firstChild);
            }
            cb.style.display = memSelectionMode ? 'flex' : 'none';
            cb.classList.toggle('active', memSelectedImages.has(id));
            card.classList.toggle('selected', memSelectedImages.has(id));
        });
    };

    window.toggleMemSelectionMode = function() {
        window._memSelectionMode = !window._memSelectionMode;
        if (!window._memSelectionMode) { window._memSelectedImages.clear(); }
        window._memUpdateSelUI();
    };

    window.toggleMemSelection = function(id) {
        if (!window._memSelectionMode) { window._memSelectionMode = true; }
        if (window._memSelectedImages.has(id)) window._memSelectedImages.delete(id);
        else window._memSelectedImages.add(id);
        window._memUpdateSelUI();
    };

    window.selectAllMemVisible = function() {
        const imgs = window._memCurrentTabImagesGlobal || [];
        if (!imgs.length) { showToast('لا توجد صور للتحديد', 'error'); return; }
        window._memSelectionMode = true;
        // استدعاء أول لإنشاء وإظهار الـ checkboxes
        window._memUpdateSelUI();
        // ثم إضافة الـ IDs وتحديث الـ UI مجدداً ليظهر الصح
        imgs.forEach(img => window._memSelectedImages.add(img.id));
        window._memUpdateSelUI();
        showToast(`تم تحديد ${formatCountEn(imgs.length)} صورة`, 'success');
    };

    window.clearMemSelection = function() {
        window._memSelectionMode = false;
        window._memSelectedImages.clear();
        window._memUpdateSelUI();
        showToast('تم إلغاء التحديد', 'success');
    };

    window.downloadMemSelected = async function() {
        const currentTabImages = window._memCurrentTabImagesGlobal || [];
        const imgs = currentTabImages.filter(img => window._memSelectedImages.has(img.id));
        if (!imgs.length) { showToast('لم تحدد أي صور', 'error'); return; }
        const overlay = document.getElementById('progressOverlay');
        const fill    = document.getElementById('progressFill');
        const ptitle  = document.getElementById('progressTitle');
        const psub    = document.getElementById('progressSubtitle');
        _downloadCancelled = false;
        overlay.classList.add('active');
        ptitle.innerText = '⬇️ جاري تنزيل الصور المحددة...';
        psub.innerText = `0 من ${formatCountEn(imgs.length)}`;
        fill.style.width = '0%';
        let done = 0;
        for (const img of imgs) {
            if (_downloadCancelled) break;
            triggerDownloadFrame(`https://drive.google.com/uc?export=download&id=${img.id}`);
            done++;
            fill.style.width = `${(done / imgs.length) * 100}%`;
            psub.innerText = `${formatCountEn(done)} من ${formatCountEn(imgs.length)}`;
            await new Promise(r => setTimeout(r, 900));
        }
        if (!_downloadCancelled) {
            overlay.classList.remove('active');
            showToast(`تم إرسال تحميل ${formatCountEn(done)} صورة ✨`, 'success');
        }
        window._memSelectionMode = false;
        window._memSelectedImages.clear();
        window._memUpdateSelUI();
    };

    // إعادة تعيين state عند تغيير التبويب
    window._resetMemSelection = function() {
        window._memSelectedImages.clear();
        window._memSelectionMode = false;
        window._memUpdateSelUI && window._memUpdateSelUI();
    };

    // ====== Cache ======
    function cacheMemories(memories, allImages) {
        try {
            // نخزّن الذكريات + مراجع مختصرة للصور الكاملة (id, name, createdTime, folderPath فقط)
            const compactAll = allImages.map(img => ({
                id: img.id, name: img.name,
                createdTime: img.createdTime,
                folderPath: img.folderPath || ''
            }));
            localStorage.setItem(MEMORIES_CACHE_KEY, JSON.stringify({
                timestamp: Date.now(),
                date: new Date().toDateString(),
                memories,
                allImages: compactAll
            }));
        } catch {}
    }
    function getCachedMemories() {
        try {
            const raw = localStorage.getItem(MEMORIES_CACHE_KEY);
            if (!raw) return null;
            const c = JSON.parse(raw);
            if (c.date !== new Date().toDateString()) return null;
            if (Date.now() - c.timestamp > MEMORIES_CACHE_DURATION) return null;
            return { memories: c.memories, allImages: c.allImages || [] };
        } catch { return null; }
    }
 
    // ====== Init ======
    initTheme();
    loadFavorites();
    loadSidebarFolders();
    loadMemories();
    if (!history.state) history.replaceState({ type: 'home' }, '', window.location.pathname);
</script>
