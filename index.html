<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معرض قروب الرحلات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
 
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255,255,255,0.7);
            --bg-glass-strong: rgba(255,255,255,0.85);
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-muted: #999;
            --border: rgba(0,0,0,0.08);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --accent: #000000;
            --accent-text: #ffffff;
            --gradient-primary: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            --gradient-bg: linear-gradient(135deg,#f0f2f5 0%,#e8eef5 50%,#f0f2f5 100%);
            --hover-bg: rgba(0,0,0,0.04);
            --danger: #ff3b30;
            --success: #34c759;
            --sidebar-width: 300px;
        }
 
        [data-theme="dark"] {
            --bg-primary: #0a0a0f;
            --bg-secondary: #16161d;
            --bg-glass: rgba(22,22,29,0.7);
            --bg-glass-strong: rgba(22,22,29,0.9);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --border: rgba(255,255,255,0.08);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
            --accent: #ffffff;
            --accent-text: #000000;
            --gradient-bg: linear-gradient(135deg,#0a0a0f 0%,#12121a 50%,#0a0a0f 100%);
            --hover-bg: rgba(255,255,255,0.06);
        }
 
        html, body { height: 100%; overflow-x: hidden; }
 
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--gradient-bg);
            color: var(--text-primary);
            direction: rtl;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }
 
        body::before {
            content: '';
            position: fixed; top:0; left:0; right:0; bottom:0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(102,126,234,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118,75,162,0.06) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(240,147,251,0.05) 0%, transparent 50%);
            pointer-events: none; z-index: -1;
        }
        [data-theme="dark"] body::before {
            background-image:
                radial-gradient(circle at 20% 50%, rgba(102,126,234,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118,75,162,0.12) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(240,147,251,0.08) 0%, transparent 50%);
        }
 
        /* ====== Nav ====== */
        .nav {
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: var(--text-primary);
            height: 70px; display: flex; align-items: center; padding: 0 18px;
            position: sticky; top: 0; z-index: 1001;
            border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm);
        }
        .nav-side { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-title {
            flex: 1; text-align: center; font-weight: 800; font-size: 18px;
            background: var(--gradient-primary);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: -0.3px;
        }
        .btn-nav {
            background: var(--bg-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); border: 1px solid var(--border);
            width: 44px; height: 44px; border-radius: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.25s ease;
        }
        .btn-nav:hover, .btn-nav:active { background: var(--hover-bg); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-nav svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
 
        /* ====== Layout ====== */
        .layout { display: flex; flex-direction: row; min-height: calc(100vh - 70px); position: relative; }
 
        /* ====== Sidebar ====== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-left: 1px solid var(--border);
            position: sticky; top: 70px; height: calc(100vh - 70px);
            overflow-y: auto; overflow-x: hidden; flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 999;
        }
        .sidebar-header {
            padding: 20px 20px 14px; border-bottom: 1px solid var(--border);
            background: var(--bg-glass-strong); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 10;
        }
        .sidebar-header h3 { font-size: 17px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .sidebar-header h3.clickable { cursor: pointer; user-select: none; }
        .sidebar-header h3.clickable:hover { color: #667eea; }
        .sidebar-header p { font-size: 12px; color: var(--text-muted); font-weight: 600; }
 
        .search-box { position: relative; margin-top: 12px; }
        .search-input {
            width: 100%; padding: 10px 38px 10px 14px; border: 1px solid var(--border);
            background: var(--bg-primary); border-radius: 12px;
            font-family: 'Cairo', sans-serif; font-size: 13px; color: var(--text-primary);
            transition: all 0.2s ease; direction: rtl;
        }
        .search-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
        .search-input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; color: var(--text-muted); pointer-events: none;
        }
 
        .sidebar-list { padding: 10px; }
        .folder-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 14px;
            border-radius: 14px; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1); margin-bottom: 5px;
            border: 1px solid transparent; user-select: none; position: relative; overflow: hidden;
        }
        .folder-item:hover { background: var(--hover-bg); transform: translateX(-3px); }
        .folder-item.active {
            background: var(--gradient-primary);
            color: #ffffff;
            border-color: rgba(255,255,255,0.18);
            box-shadow: 0 8px 22px rgba(102,126,234,0.35);
            transform: translateX(-3px);
        }
        .folder-item.active .folder-item-count {
            background: rgba(255,255,255,0.22);
            color: #ffffff;
        }
        [data-theme="dark"] .folder-item.active {
            border-color: rgba(255,255,255,0.14);
            box-shadow: 0 10px 26px rgba(0,0,0,0.45);
        }
        [data-theme="dark"] .folder-item.active .folder-item-count { background: rgba(255,255,255,0.18); }
        .folder-item.hidden-el { display: none; }
        .folder-item-icon { font-size: 20px; flex-shrink: 0; width: 26px; text-align: center; }
        .folder-item-content { flex: 1; min-width: 0; }
        .folder-item-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .folder-item-count { font-size: 10px; color: var(--text-muted); background: var(--bg-primary); padding: 2px 7px; border-radius: 8px; display: inline-block; font-weight: 700; }

        /* شجرة المجلدات الفرعية */
        .sidebar-sub-list { padding: 0; margin: 0; }
        .sidebar-sub-item {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px 6px 24px;
            border-radius: 10px; cursor: pointer;
            transition: all 0.18s ease; margin-bottom: 2px;
            border: 1px solid transparent; font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
        }
        .sidebar-sub-item:hover { background: var(--hover-bg); color: var(--text-primary); }
        .sidebar-sub-item.active { background: rgba(102,126,234,0.13); color: #667eea; }
        .sidebar-sub-item.hidden-el { display: none; }
        .sidebar-sub-item-icon { font-size: 13px; flex-shrink: 0; opacity: 0.7; }
        .sidebar-sub-item-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* المستوى الثاني والثالث */
        .sidebar-sub-item[data-depth="2"] { padding-right: 36px; font-size: 11px; }
        .sidebar-sub-item[data-depth="3"] { padding-right: 50px; font-size: 11px; }
        /* مؤشر التحميل */
        .sidebar-tree-loading { padding: 6px 20px; font-size: 11px; color: var(--text-muted); }
 
        /* ====== Main Content ====== */
        .main-content { flex: 1; padding: 22px; min-width: 0; max-width: 100%; }
 
        /* ====== Breadcrumb ====== */
        .breadcrumb {
            display: flex; align-items: center; gap: 6px; padding: 10px 16px;
            background: var(--bg-glass-strong); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px; flex-wrap: wrap; box-shadow: var(--shadow-sm);
        }
        .breadcrumb-item {
            display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px;
            border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--text-secondary);
            cursor: pointer; transition: all 0.2s ease; background: transparent; border: none; font-family: 'Cairo', sans-serif;
        }
        .breadcrumb-item:hover { background: var(--hover-bg); color: var(--text-primary); }
        .breadcrumb-item.current { color: var(--text-primary); background: var(--hover-bg); cursor: default; }
        .breadcrumb-item svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .breadcrumb-separator { color: var(--text-muted); font-size: 14px; user-select: none; }
 
        /* ====== Content Header ====== */
        .content-header {
            background: var(--bg-glass-strong); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border); border-radius: 20px; padding: 18px 22px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between; gap: 15px; box-shadow: var(--shadow-sm); flex-wrap: wrap;
        }
        .content-header-info { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1; }
        .content-header-icon { font-size: 32px; flex-shrink: 0; }
        .content-header-text { min-width: 0; flex: 1; }
        .content-header-title { font-size: 17px; font-weight: 800; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
        .content-header-subtitle { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .content-actions { display: flex; gap: 8px; flex-wrap: wrap; }
 
        .btn-action {
            display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px;
            border-radius: 12px; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700;
            cursor: pointer; border: 1px solid var(--border); background: var(--bg-primary);
            color: var(--text-primary); transition: all 0.2s ease; white-space: nowrap;
        }
        .btn-action:hover { background: var(--hover-bg); transform: translateY(-1px); }
        .btn-action.primary { background: var(--gradient-primary); color: white; border-color: transparent; }
        .btn-action.primary:hover { box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .btn-action svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
 
        /* ====== Filter Bar ====== */
        .filter-bar {
            background: var(--bg-glass-strong); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border); border-radius: 16px; padding: 10px 14px;
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
            box-shadow: var(--shadow-sm); flex-wrap: wrap;
        }
        .filter-search { flex: 1; position: relative; min-width: 160px; }
        .filter-search .search-input { padding: 8px 34px 8px 12px; font-size: 12px; }
        .filter-search .search-icon { width: 14px; height: 14px; right: 10px; }
 
        /* ====== Sort Buttons ====== */
        .sort-wrapper { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .btn-sort-opt {
            display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px;
            border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 700;
            cursor: pointer; border: 1px solid var(--border); background: var(--bg-primary);
            color: var(--text-secondary); transition: all 0.2s ease; white-space: nowrap; user-select: none;
        }
        .btn-sort-opt:hover { background: var(--hover-bg); color: var(--text-primary); }
        .btn-sort-opt.active { background: var(--gradient-primary); color: white; border-color: transparent; box-shadow: 0 2px 8px rgba(102,126,234,0.3); }
        .btn-sort-opt svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
        .sort-text { display: inline; }
 
        /* ====== View Toggle ====== */
        .view-toggle { display: flex; gap: 3px; flex-shrink: 0; }
        .btn-view {
            width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-primary); color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .btn-view:hover { color: var(--text-primary); background: var(--hover-bg); }
        .btn-view.active { background: var(--accent); color: var(--accent-text); border-color: transparent; }
        .btn-view svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
 
        /* ====== Section titles ====== */
        .section-title {
            font-size: 13px; font-weight: 800; color: var(--text-muted); margin-bottom: 12px; margin-top: 8px;
            display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;
        }
        .section-title:first-child { margin-top: 0; }
 
        /* ====== Folders Grid ====== */
        .folders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 22px; }
        .subfolders-toolbar { margin-bottom: 10px; }
        .subfolders-toolbar .search-input { padding: 8px 34px 8px 12px; font-size: 12px; }
        .subfolders-toolbar .search-icon { width: 14px; height: 14px; right: 10px; }
        .folder-card {
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px;
            padding: 18px 12px; text-align: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow: var(--shadow-sm);
            animation: fadeIn 0.4s ease backwards; position: relative; overflow: hidden;
        }
        .folder-card::before { content: ''; position: absolute; inset: 0; background: var(--gradient-primary); opacity: 0; transition: opacity 0.3s; z-index: 0; }
        .folder-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(102,126,234,0.4); }
        .folder-card:hover::before { opacity: 0.05; }
        .folder-card-icon { font-size: 44px; display: block; margin-bottom: 8px; position: relative; z-index: 1; }
        .folder-card-name { font-size: 13px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; position: relative; z-index: 1; }
        .folder-card-count { font-size: 11px; color: var(--text-muted); background: var(--bg-primary); padding: 3px 10px; border-radius: 10px; display: inline-block; font-weight: 700; position: relative; z-index: 1; }
 
        /* ====== Images Grid ====== */
        .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 18px; }
 
        /* List view */
        .images-grid.list-view { grid-template-columns: 1fr; gap: 10px; }
        .images-grid.list-view .image-card { display: flex; flex-direction: row; align-items: center; border-radius: 14px; }
        .images-grid.list-view .image-card:hover { transform: translateX(-3px) translateY(0); }
        .images-grid.list-view .img-container { width: 88px; min-height: 66px; height: 66px; flex-shrink: 0; border-radius: 10px; margin: 8px; overflow: hidden; }
        .images-grid.list-view .img-container img { max-height: 66px; object-fit: cover; }
        .images-grid.list-view .img-overlay { display: none; }
        .images-grid.list-view .img-info { flex: 1; padding: 8px 12px 8px 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .images-grid.list-view .img-name { white-space: normal; -webkit-line-clamp: 2; }
        .images-grid.list-view .img-checkbox { top: 50%; transform: translateY(-50%); }
        .images-grid.list-view .img-meta { flex: 1; min-width: 120px; }
        .images-grid.list-view .btn-download,
        .images-grid.list-view .btn-share { padding: 7px 10px; font-size: 11px; white-space: nowrap; }
 
        /* ====== Skeleton ====== */
        .skeleton-card { background: var(--bg-secondary); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .skeleton-img { width: 100%; height: 220px; background: linear-gradient(90deg, var(--bg-primary) 0%, var(--hover-bg) 50%, var(--bg-primary) 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        .skeleton-info { padding: 14px; }
        .skeleton-line { height: 12px; background: linear-gradient(90deg, var(--bg-primary) 0%, var(--hover-bg) 50%, var(--bg-primary) 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; margin-bottom: 8px; }
        .skeleton-line:last-child { width: 60%; margin-bottom: 0; }
 
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes spin { to { transform: rotate(360deg); } }
 
        /* ====== Image Card ====== */
        .image-card {
            background: var(--bg-secondary); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border); box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1); position: relative; animation: fadeIn 0.4s ease backwards;
        }
        .image-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(102,126,234,0.3); }
        .image-card.selected { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.3), var(--shadow-md); }
 
        .img-checkbox {
            position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 8px;
            background: var(--bg-glass-strong); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 5; transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .img-checkbox.active { background: #667eea; border-color: white; }
        .img-checkbox svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity 0.2s; }
        .img-checkbox.active svg { opacity: 1; }
        .selection-mode .img-checkbox { display: flex; }
 
        .img-container {
            width: 100%; background: #111; display: flex; align-items: center; justify-content: center;
            min-height: 220px; cursor: pointer; overflow: hidden; position: relative;
        }
        .img-container img {
            width: 100%; height: auto; max-height: 460px; display: block; object-fit: contain;
            opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .img-container img.loaded { opacity: 1; }
        .img-container:hover img.loaded { transform: scale(1.03); }
 
        .img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 18px;
        }
        .img-container:hover .img-overlay { opacity: 1; }
        .img-overlay span {
            color: white; font-size: 12px; font-weight: 700;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 6px 14px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px;
        }
        .img-overlay svg { width: 14px; height: 14px; fill: none; stroke: white; stroke-width: 2.5; }
 
        .img-info { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .img-meta { flex: 1; min-width: 0; }
        .img-name { font-size: 12px; color: var(--text-secondary); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .img-date { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-top: 3px; display: flex; align-items: center; gap: 4px; }
        .img-date svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
 
        .btn-download {
            background: var(--accent); color: var(--accent-text); text-decoration: none; padding: 7px 13px;
            border-radius: 10px; font-size: 12px; font-weight: 700; flex-shrink: 0;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
            cursor: pointer; border: none; font-family: 'Cairo', sans-serif;
        }
        .btn-download:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-download svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
 
        .btn-share {
            background: var(--bg-primary); color: var(--text-primary); padding: 7px 11px;
            border-radius: 10px; font-size: 12px; font-weight: 700; flex-shrink: 0;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
            cursor: pointer; border: 1px solid var(--border); font-family: 'Cairo', sans-serif;
        }
        .btn-share:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); background: var(--hover-bg); }
        .btn-share svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .img-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
 
        /* ====== Empty State ====== */
        .empty-state { text-align: center; padding: 70px 20px; color: var(--text-muted); grid-column: 1/-1; font-size: 14px; animation: fadeIn 0.5s ease; }
        .empty-state-icon { font-size: 70px; margin-bottom: 18px; opacity: 0.4; }
        .empty-state-title { font-size: 19px; font-weight: 800; color: var(--text-secondary); margin-bottom: 8px; }
 
        /* ====== Sidebar helpers ====== */
        .sidebar-loader, .sidebar-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; font-weight: 600; }
 
        /* ====== Lightbox ====== */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; flex-direction: column; animation: fadeIn 0.3s ease; }
        .lightbox.active { display: flex; }
 
        .lightbox-header {
            display: flex; justify-content: space-between; align-items: center; padding: 14px 18px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            color: white; flex-shrink: 0; z-index: 10; gap: 10px;
        }
        .lightbox-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
        .lightbox-counter { font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 20px; flex-shrink: 0; }
        .lightbox-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .lightbox-btn {
            width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.1);
            border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; text-decoration: none;
        }
        .lightbox-btn:hover { background: rgba(255,255,255,0.2); }
        .lightbox-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
 
        .lightbox-body { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 20px; cursor: grab; }
        .lightbox-body.dragging { cursor: grabbing; }
        .lightbox-img {
            max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain;
            user-select: none; -webkit-user-drag: none; transition: opacity 0.2s ease;
            transform-origin: center center;
            touch-action: none;
        }
        .lightbox-img.zoomed { cursor: move; transition: opacity 0.2s ease; }
        .lightbox-zoom-hint {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7);
            padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 600;
            pointer-events: none; opacity: 1; transition: opacity 1s ease;
        }
        .lightbox-zoom-hint.fade { opacity: 0; }
 
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px;
            border-radius: 50%; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; z-index: 5;
        }
        .lightbox-nav:hover:not(:disabled) { background: rgba(255,255,255,0.28); transform: translateY(-50%) scale(1.08); }
        .lightbox-nav.prev { right: 20px; }
        .lightbox-nav.next { left: 20px; }
        .lightbox-nav svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .lightbox-nav:disabled { opacity: 0.25; cursor: not-allowed; }
 
        /* Lightbox info bar */
        .lightbox-info {
            background: rgba(0,0,0,0.45); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 9px 18px; display: flex; align-items: center; gap: 18px; flex-shrink: 0;
            color: rgba(255,255,255,0.65); font-size: 11px; font-weight: 600; flex-wrap: wrap;
        }
        .lightbox-info-item { display: flex; align-items: center; gap: 5px; }
        .lightbox-info-item svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.7; }
 
        /* ====== Toast ====== */
        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--bg-glass-strong); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: var(--text-primary); padding: 13px 20px; border-radius: 14px;
            border: 1px solid var(--border); box-shadow: var(--shadow-lg); font-size: 13px; font-weight: 700;
            z-index: 3000; display: flex; align-items: center; gap: 10px;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast-icon { width: 20px; height: 20px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .toast.success .toast-icon { stroke: var(--success); }
        .toast.error .toast-icon { stroke: var(--danger); }
 
        /* ====== Progress Overlay ====== */
        .progress-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 2500; display: none; align-items: center; justify-content: center; }
        .progress-overlay.active { display: flex; }
        .progress-box { background: var(--bg-glass-strong); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 30px; min-width: 300px; max-width: 90%; text-align: center; box-shadow: var(--shadow-lg); }
        .progress-title { font-size: 16px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
        .progress-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; font-weight: 600; }
        .progress-bar { width: 100%; height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gradient-primary); width: 0%; transition: width 0.3s ease; border-radius: 4px; }
 
        /* ====== Scroll to top buttons ====== */
        #navScrollTop {
            display: none;
        }
        #navScrollTop.visible {
            display: flex;
        }
        .btn-back-top {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg-glass-strong);
            backdrop-filter: blur(16px) saturate(160%);
            -webkit-backdrop-filter: blur(16px) saturate(160%);
            color: var(--text-primary);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(14px);
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
            z-index: 1600;
        }
        .btn-back-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .btn-back-top svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
 
        /* ====== Sidebar overlay / toggle ====== */
        .sidebar-toggle { display: none; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 998; opacity: 0; transition: opacity 0.3s ease; }
        .sidebar-overlay.active { display: block; opacity: 1; }
 
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
 
        .hidden-el { display: none !important; }
 
        /* ====== Memories ====== */
        .memories-hero {
            position: relative; background: var(--gradient-primary); border-radius: 24px;
            padding: 32px 28px; margin-bottom: 24px; overflow: hidden; box-shadow: var(--shadow-lg); animation: fadeIn 0.6s ease;
        }
        .memories-hero::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 50%), radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .memories-hero-content { position: relative; z-index: 1; color: white; }
        .memories-hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.3); }
        .memories-hero-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; letter-spacing: -0.5px; }
        .memories-hero-subtitle { font-size: 14px; font-weight: 600; opacity: 0.9; }
        .memories-hero-icon { font-size: 36px; margin-bottom: 8px; display: block; }
 
        .memory-year-group { margin-bottom: 28px; animation: fadeIn 0.5s ease backwards; }
        .memory-year-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding: 10px 16px; background: var(--bg-glass-strong); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-sm); }
        .memory-year-number { font-size: 22px; font-weight: 900; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
        .memory-year-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); background: var(--bg-primary); padding: 4px 10px; border-radius: 8px; }
        .memory-year-count { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-right: auto; }
 
        .memory-card { position: relative; overflow: hidden; }
        .memory-card-badge { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: white; padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 3; display: inline-flex; align-items: center; gap: 4px; letter-spacing: 0.3px; }
        .memory-card-badge svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .memory-card-folder { font-size: 10px; color: var(--text-muted); font-weight: 700; display: flex; align-items: center; gap: 4px; margin-top: 3px; }
 
        .memories-loading { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .memories-loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        .memories-loading-text { font-size: 14px; font-weight: 600; }
        .memories-loading-progress { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .memories-tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
        .memories-tab {
            border: 1px solid var(--border);
            background: var(--bg-glass-strong);
            color: var(--text-secondary);
            border-radius: 10px;
            padding: 7px 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .memories-tab.active {
            background: var(--gradient-primary);
            color: #fff;
            border-color: transparent;
            box-shadow: var(--shadow-sm);
        }
        .memories-tab-panel.hidden-el { display: none !important; }
 
        .memories-empty { text-align: center; padding: 50px 20px; background: var(--bg-glass-strong); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; }
        .memories-empty-icon { font-size: 60px; margin-bottom: 14px; opacity: 0.5; }
        .memories-empty-title { font-size: 17px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
        .memories-empty-text { font-size: 13px; color: var(--text-muted); font-weight: 600; }
 
        /* ====== Responsive ====== */
        @media (max-width: 900px) {
            :root { --sidebar-width: 270px; }
            .images-grid { grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 14px; }
            .main-content { padding: 16px; }
            .folders-grid { grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); }
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; right: 0; height: 100vh; width: 85%; max-width: 320px; transform: translateX(100%); box-shadow: -5px 0 30px rgba(0,0,0,0.2); z-index: 1002; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-toggle { display: flex; }
            .main-content { padding: 14px; width: 100%; }
            .content-header { padding: 14px 16px; border-radius: 16px; }
            .content-header-icon { font-size: 26px; }
            .content-header-title { font-size: 15px; }
            .images-grid { grid-template-columns: 1fr; gap: 14px; }
            .folders-grid { grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 10px; }
            .folder-card { padding: 14px 8px; }
            .folder-card-icon { font-size: 36px; }
            .folder-card-name { font-size: 12px; }
            .img-container { min-height: 200px; }
            .lightbox-nav.prev { right: 10px; }
            .lightbox-nav.next { left: 10px; }
            .lightbox-nav { width: 42px; height: 42px; }
            .breadcrumb { padding: 8px 12px; }
            .breadcrumb-item { font-size: 11px; padding: 4px 8px; }
            .btn-back-top { bottom: 18px; left: 18px; width: 44px; height: 44px; }
        }
        @media (max-width: 500px) {
            .sort-text { display: none; }
            .btn-sort-opt { padding: 6px 8px; }
            .btn-sort-opt svg { width: 13px; height: 13px; }
        }
        @media (max-width: 400px) {
            .nav-title { font-size: 15px; }
            .main-content { padding: 10px; }
            .content-header { padding: 12px 14px; gap: 10px; }
            .content-actions { width: 100%; justify-content: flex-start; }
            .btn-action { padding: 8px 12px; font-size: 11px; }
            .lightbox-title { font-size: 12px; }
            .lightbox-btn { width: 36px; height: 36px; }
            .lightbox-counter { font-size: 11px; padding: 4px 10px; }
        }
        @supports (-webkit-touch-callout: none) {
            .sidebar { -webkit-overflow-scrolling: touch; }
            body { -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body>
 
<div class="nav">
    <div class="nav-side">
        <button class="btn-nav sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" aria-label="فتح القائمة">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
    </div>
    <div class="nav-title">✨ معرض قروب الرحلات ✨</div>
    <div class="nav-side">
        <button class="btn-nav" id="themeToggle" onclick="toggleTheme()" aria-label="تبديل الوضع">
            <svg id="themeIcon" viewBox="0 0 24 24"></svg>
        </button>
        <button class="btn-nav" id="navScrollTop" onclick="scrollToTopSafe()" aria-label="الصعود للأعلى" title="الصعود للأعلى">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
    </div>
</div>
 
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<button class="btn-back-top" id="floatingScrollTop" onclick="scrollToTopSafe()" aria-label="الصعود للأعلى" title="الصعود للأعلى">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
</button>
 
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 class="clickable" onclick="showRootFoldersPreview()">📂 المجلدات الرئيسية</h3>
            <p id="sidebarSubtitle">اختر مجلد لعرض محتواه</p>
            <div class="search-box">
                <input type="text" class="search-input" id="folderSearch" placeholder="ابحث في المجلدات..." oninput="filterFolders()">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </div>
        </div>
        <div class="sidebar-list" id="sidebarList">
            <div class="sidebar-loader">⏳ جاري تحميل المجلدات...</div>
        </div>
    </aside>
 
    <main class="main-content">
        <nav class="breadcrumb hidden-el" id="breadcrumb"></nav>
 
        <div id="contentHeader" class="content-header hidden-el">
            <div class="content-header-info">
                <span class="content-header-icon">📁</span>
                <div class="content-header-text">
                    <div class="content-header-title" id="currentFolderName"></div>
                    <div class="content-header-subtitle" id="currentFolderCount"></div>
                </div>
            </div>
            <div class="content-actions" id="contentActions">
                <button class="btn-action" id="selectBtn" onclick="toggleSelectionMode()">
                    <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    <span id="selectBtnText">تحديد</span>
                </button>
                <button class="btn-action" id="selectVisibleBtn" onclick="selectAllVisible()">
                    <svg viewBox="0 0 24 24"><path d="M3 12h18"/><path d="M12 3v18"/></svg>
                    <span>تحديد الظاهر</span>
                </button>
                <button class="btn-action" id="clearSelectionBtn" onclick="clearSelectionFast()">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    <span>إلغاء التحديد</span>
                </button>
                <button class="btn-action" id="copyFolderLinkBtn" onclick="copyCurrentFolderLink()">
                    <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11 5"/><path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07L13 19"/></svg>
                    <span>نسخ الرابط</span>
                </button>
                <button class="btn-action" id="refreshFolderBtn" onclick="refreshCurrentFolder()">
                    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.5 9a9 9 0 0 1 14.1-3.36L23 10M1 14l5.4 4.36A9 9 0 0 0 20.5 15"/></svg>
                    <span>تحديث</span>
                </button>
                <button class="btn-action primary hidden-el" id="downloadZipBtn" onclick="downloadSelectedAsZip()">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span id="downloadZipText">تنزيل (0)</span>
                </button>
            </div>
        </div>
 
        <div id="filterBar" class="filter-bar hidden-el">
            <div class="filter-search">
                <input type="text" class="search-input" id="imageFilter" placeholder="ابحث عن صورة أو مجلد..." oninput="filterImages()">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </div>
            <div class="sort-wrapper">
                <button class="btn-sort-opt active" data-sort="newest" onclick="applySort('newest')">
                    <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    <span class="sort-text">الأحدث</span>
                </button>
                <button class="btn-sort-opt" data-sort="oldest" onclick="applySort('oldest')">
                    <svg viewBox="0 0 24 24"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
                    <span class="sort-text">الأقدم</span>
                </button>
                <button class="btn-sort-opt" data-sort="name-asc" onclick="applySort('name-asc')">
                    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="9" y2="18"/></svg>
                    <span class="sort-text">أ→ي</span>
                </button>
                <button class="btn-sort-opt" data-sort="name-desc" onclick="applySort('name-desc')">
                    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="9" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
                    <span class="sort-text">ي→أ</span>
                </button>
            </div>

<script>
    const API_KEY        = 'AIzaSyCv3v7LHte7hTY82NmUmj9OJLxR0zFY0bU';
    const ROOT_FOLDER_ID = '1r0VfqjSzznFHhqMYFhB5bPzCeW92YFHa';
 
    // ====== State ======
    let allFolders     = [];
    let currentFolderId   = null;
    let currentFolderName = '';
    let currentImages     = [];
    let currentSubFolders = [];
    let filteredSubFolders = [];
    let subFolderCounts = {};
    let filteredImages    = [];
    let selectionMode     = false;
    let selectedImages    = new Set();
    let lightboxIndex     = 0;
    let lightboxImages    = [];
    let navigationPath    = [];
    let currentSort       = 'newest';
    let currentView       = 'grid';
 
    const ARABIC_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    const ARABIC_DAYS   = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
 
    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d)) return '';
        return `${d.getDate()} ${ARABIC_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    }
 
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.innerText = String(text || '');
        return div.innerHTML;
    }
 
    // ====== Theme ======
    function initTheme() {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        updateThemeIcon(saved);
    }
    function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeIcon(next);
    }
    function updateThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        icon.setAttribute('fill', 'none'); icon.setAttribute('stroke', 'currentColor');
        icon.setAttribute('stroke-width', '2.2'); icon.setAttribute('stroke-linecap', 'round'); icon.setAttribute('stroke-linejoin', 'round');
        icon.innerHTML = theme === 'dark'
            ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
            : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    }
    function exitApp() {
        const confirmed = window.confirm('هل أنت متأكد أنك تريد الخروج من التطبيق؟');
        if (!confirmed) return;
        try {
            if (window.Android && typeof window.Android.exitApp === 'function') {
                window.Android.exitApp();
                return;
            }
            if (window.ReactNativeWebView && typeof window.ReactNativeWebView.postMessage === 'function') {
                window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'EXIT_APP' }));
                return;
            }
            if (typeof window.close === 'function') window.close();
        } catch (_) {}
        showToast('ميزة الخروج تعمل داخل التطبيق فقط', 'error');
    }
 
    // ====== Pagination helper: جلب كل الملفات ======
    async function fetchAllFilesInFolder(folderId, fields, orderBy = '') {
        let allFiles = [], pageToken = null;
        do {
            let url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,${fields}&key=${API_KEY}&pageSize=1000`;
            if (orderBy)   url += `&orderBy=${orderBy}`;
            if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;
            const res  = await fetch(url);
            const data = await res.json();
            if (data.files) allFiles = allFiles.concat(data.files);
            pageToken = data.nextPageToken || null;
        } while (pageToken);
        return allFiles;
    }
 
    // ====== Sort ======
    function applySortToFiltered() {
        filteredImages.sort((a, b) => {
            switch (currentSort) {
                case 'newest':    return new Date(b.createdTime) - new Date(a.createdTime);
                case 'oldest':    return new Date(a.createdTime) - new Date(b.createdTime);
                case 'name-asc':  return (a.name || '').localeCompare(b.name || '', 'ar');
                case 'name-desc': return (b.name || '').localeCompare(a.name || '', 'ar');
                default: return 0;
            }
        });
    }
    function applySort(sortKey) {
        currentSort = sortKey;
        document.querySelectorAll('.btn-sort-opt').forEach(el => el.classList.toggle('active', el.dataset.sort === sortKey));
        applySortToFiltered();
        renderImagesGrid();
    }
 
    // ====== View Toggle ======
    function setView(view) {
        currentView = view;
        document.getElementById('viewGrid').classList.toggle('active', view === 'grid');
        document.getElementById('viewList').classList.toggle('active', view === 'list');
        const grid = document.getElementById('displayArea');
        grid.classList.toggle('list-view', view === 'list');
    }
 
    // ====== Scroll to Top (Browser + Android WebView safe) ======
    function getScrollableTargets() {
        const targets = [
            document.scrollingElement,
            document.documentElement,
            document.body,
            document.querySelector('.main-content'),
            document.querySelector('.layout'),
            document.querySelector('.sidebar')
        ].filter(Boolean);
        return [...new Set(targets)];
    }
    function getScrollTopValue() {
        const tops = getScrollableTargets().map(el => el.scrollTop || 0);
        tops.push(window.pageYOffset || 0);
        return Math.max(...tops);
    }
    const isAndroidWebView = /Android/i.test(navigator.userAgent || '');
    const scrollTopShowThreshold = isAndroidWebView ? 140 : 300;
    function toggleScrollTopButtons() {
        const isVisible = getScrollTopValue() > scrollTopShowThreshold;
        const navBtn = document.getElementById('navScrollTop');
        const floatingBtn = document.getElementById('floatingScrollTop');
        if (navBtn) navBtn.classList.toggle('visible', isVisible);
        if (floatingBtn) floatingBtn.classList.toggle('visible', isVisible);
    }
    function scrollToTopSafe() {
        const targets = getScrollableTargets();
        try {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (_) {
            window.scrollTo(0, 0);
        }
        targets.forEach(el => {
            el.scrollTop = 0;
            if (typeof el.scrollTo === 'function') {
                try {
                    el.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (_) {
                    el.scrollTop = 0;
                }
            }
        });
        requestAnimationFrame(() => {
            targets.forEach(el => { el.scrollTop = 0; });
            window.scrollTo(0, 0);
            toggleScrollTopButtons();
        });
    }
    window.addEventListener('scroll', toggleScrollTopButtons, { passive: true });
    document.addEventListener('scroll', toggleScrollTopButtons, { passive: true });
    window.addEventListener('touchmove', toggleScrollTopButtons, { passive: true });
    window.addEventListener('touchstart', toggleScrollTopButtons, { passive: true });
    getScrollableTargets().forEach(el => {
        el.addEventListener('scroll', toggleScrollTopButtons, { passive: true });
        el.addEventListener('touchmove', toggleScrollTopButtons, { passive: true });
        el.addEventListener('touchstart', toggleScrollTopButtons, { passive: true });
    });
    document.addEventListener('DOMContentLoaded', toggleScrollTopButtons);
 
    // ====== Sidebar — شجرة المجلدات الكاملة ======
    let sidebarTree = [];

    async function loadSidebarFolders() {
        const sidebarList = document.getElementById('sidebarList');
        sidebarList.innerHTML = '<div class="sidebar-loader">⏳ جاري تحميل المجلدات...</div>';
        try {
            const url = `https://www.googleapis.com/drive/v3/files?q='${ROOT_FOLDER_ID}'+in+parents+and+trashed=false+and+mimeType='application/vnd.google-apps.folder'&fields=files(id,name)&key=${API_KEY}&orderBy=name`;
            const res  = await fetch(url);
            const data = await res.json();
            if (!data.files || data.files.length === 0) {
                sidebarList.innerHTML = '<div class="sidebar-empty">لا توجد مجلدات</div>';
                document.getElementById('sidebarSubtitle').innerText = '0 مجلد';
                return;
            }
            allFolders = data.files;
            document.getElementById('sidebarSubtitle').innerText = `${allFolders.length} مجلد رئيسي`;
            sidebarTree = allFolders.map(f => ({ id: f.id, name: f.name, depth: 1, children: [], imageCount: null }));
            renderSidebarTree();
            // جلب الأبناء والعدادات في الخلفية
            await Promise.all(sidebarTree.map(node => loadTreeChildren(node, 3)));
        } catch (e) {
            sidebarList.innerHTML = '<div class="sidebar-empty">⚠️ حدث خطأ في التحميل</div>';
        }
    }

    async function loadTreeChildren(node, maxDepth) {
        try {
            const url = `https://www.googleapis.com/drive/v3/files?q='${node.id}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)&key=${API_KEY}&orderBy=name&pageSize=500`;
            const res  = await fetch(url);
            const data = await res.json();
            if (!data.files) return;
            const subFolders = data.files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
            const imgCount   = data.files.filter(f => f.mimeType?.startsWith('image/')).length;
            node.imageCount  = imgCount;
            node.children    = subFolders.map(f => ({ id: f.id, name: f.name, depth: node.depth + 1, children: [], imageCount: null }));
            updateNodeDisplay(node);
            if (node.depth < maxDepth) {
                await Promise.all(node.children.map(child => loadTreeChildren(child, maxDepth)));
            } else {
                // أعمق مستوى: فقط عدادات بدون أبناء
                for (const child of node.children) {
                    const container = document.getElementById(`sub-list-${node.id}`);
                    if (container) appendNodeToDOM(child, container);
                }
            }
        } catch (e) {}
    }

    function updateNodeDisplay(node) {
        // تحديث العداد
        const countEl = document.getElementById(`tree-count-${node.id}`);
        if (countEl) {
            const s = node.children.length, img = node.imageCount || 0;
            countEl.innerText = s > 0 && img > 0 ? `${s}📁 ${img}🖼`
                              : s > 0 ? `${s} مجلد`
                              : img > 0 ? `${img} صورة`
                              : 'فارغ';
        }
        // إضافة الأبناء إلى الـ DOM
        const subContainer = document.getElementById(`sub-list-${node.id}`);
        if (subContainer && node.children.length > 0 && subContainer.children.length === 0) {
            node.children.forEach(child => appendNodeToDOM(child, subContainer));
        }
    }

    function appendNodeToDOM(node, container) {
        const el = document.createElement('div');
        el.className = 'sidebar-sub-item';
        el.id = `tree-node-${node.id}`;
        el.dataset.name = node.name.toLowerCase();
        el.dataset.depth = node.depth;
        el.onclick = () => openFolder(node.id, node.name, false);
        el.innerHTML = `<span class="sidebar-sub-item-icon">📂</span><span class="sidebar-sub-item-name">${escapeHtml(node.name)}</span><span class="folder-item-count" id="tree-count-${node.id}">...</span>`;
        container.appendChild(el);
        const subSub = document.createElement('div');
        subSub.className = 'sidebar-sub-list';
        subSub.id = `sub-list-${node.id}`;
        container.appendChild(subSub);
    }

    function renderSidebarTree() {
        const sidebarList = document.getElementById('sidebarList');
        sidebarList.innerHTML = '';
        sidebarTree.forEach((node, i) => {
            const item = document.createElement('div');
            item.className = 'folder-item';
            item.id = `folder-${node.id}`;
            item.dataset.name = node.name.toLowerCase();
            item.style.cssText = `animation-delay:${i*30}ms;animation:fadeIn 0.4s ease backwards`;
            item.onclick = () => openFolder(node.id, node.name, true);
            item.innerHTML = `
                <span class="folder-item-icon">📁</span>
                <div class="folder-item-content">
                    <div class="folder-item-name">${escapeHtml(node.name)}</div>
                    <span class="folder-item-count" id="tree-count-${node.id}">...</span>
                </div>`;
            sidebarList.appendChild(item);
            const subContainer = document.createElement('div');
            subContainer.className = 'sidebar-sub-list';
            subContainer.id = `sub-list-${node.id}`;
            sidebarList.appendChild(subContainer);
        });
    }

    // البحث LIKE في كل الشجرة مع إظهار الأجداد
    function filterFolders() {
        const q = document.getElementById('folderSearch').value.toLowerCase().trim();
        if (q === '') {
            document.querySelectorAll('.folder-item, .sidebar-sub-item').forEach(el => el.classList.remove('hidden-el'));
            return;
        }
        // أخفِ الكل أولاً
        document.querySelectorAll('.folder-item, .sidebar-sub-item').forEach(el => el.classList.add('hidden-el'));
        // أظهر المطابق وأجداده
        document.querySelectorAll('.folder-item, .sidebar-sub-item').forEach(el => {
            if ((el.dataset.name || '').includes(q)) {
                el.classList.remove('hidden-el');
                // أظهر كل الأجداد
                let parent = el.parentElement;
                while (parent && parent.id !== 'sidebarList') {
                    if (parent.classList.contains('sidebar-sub-list')) {
                        const prev = parent.previousElementSibling;
                        if (prev) prev.classList.remove('hidden-el');
                    }
                    parent = parent.parentElement;
                }
            }
        });
    }

    function filterImages() {
        const q = document.getElementById('imageFilter').value.toLowerCase().trim();
        filteredImages = q === '' ? [...currentImages] : currentImages.filter(img => img.name.toLowerCase().includes(q));
        applySortToFiltered();
        renderImagesGrid();
    }
    function filterSubFolders() {
        const input = document.getElementById('subFolderFilter');
        const q = (input?.value || '').toLowerCase().trim();
        filteredSubFolders = q === ''
            ? [...currentSubFolders]
            : currentSubFolders.filter(folder => (folder.name || '').toLowerCase().includes(q));
        renderSubFolders();
    }

    function filterFoldersGlobal() { filterFolders(); }
    async function updateFolderItemCount(folderId) {}
    async function loadSubFoldersInSidebar(parentId) {}
    async function updateSidebarSubCount(folderId) {}
    function showRootFoldersPreview() {
        selectionMode = false;
        selectedImages.clear();
        updateSelectionUI();
        navigationPath = [];
        currentFolderId = null;
        currentFolderName = 'المجلدات الرئيسية';
        currentImages = [];
        filteredImages = [];
        currentSubFolders = (allFolders || []).map(f => ({ id: f.id, name: f.name, mimeType: 'application/vnd.google-apps.folder' }));
        filteredSubFolders = [...currentSubFolders];
        document.querySelectorAll('.folder-item, .sidebar-sub-item').forEach(el => el.classList.remove('active'));
        document.getElementById('defaultEmptyState').classList.add('hidden-el');
        document.getElementById('breadcrumb').classList.remove('hidden-el');
        document.getElementById('contentHeader').classList.remove('hidden-el');
        document.getElementById('filterBar').classList.add('hidden-el');
        document.getElementById('imagesSection').classList.add('hidden-el');
        document.getElementById('subFoldersSection').classList.remove('hidden-el');
        document.getElementById('contentActions').style.display = 'none';
        document.getElementById('currentFolderName').innerText = 'المجلدات الرئيسية';
        document.getElementById('currentFolderCount').innerText = `${currentSubFolders.length} مجلد`;
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = '<button class="breadcrumb-item current">📂 المجلدات الرئيسية</button>';
        const subFolderFilter = document.getElementById('subFolderFilter');
        if (subFolderFilter) subFolderFilter.value = '';
        renderSubFolders();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
 
    // ====== Open Folder ======
    async function openFolder(folderId, folderName, isRootLevel = false, skipHistory = false) {
        // أغلق الـ lightbox لو مفتوح
        const lb = document.getElementById('lightbox');
        if (lb.classList.contains('active')) { lb.classList.remove('active'); document.body.style.overflow = ''; }
 
        currentFolderId   = folderId;
        currentFolderName = folderName;
 
        if (isRootLevel) {
            navigationPath = [{ id: folderId, name: folderName }];
            document.querySelectorAll('.folder-item, .sidebar-sub-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`folder-${folderId}`)?.classList.add('active');
        } else {
            navigationPath.push({ id: folderId, name: folderName });
            document.querySelectorAll('.sidebar-sub-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tree-node-${folderId}`)?.classList.add('active');
        }
 
        if (!skipHistory) history.pushState({ type: 'folder', path: [...navigationPath] }, folderName, `#${encodeURIComponent(folderName)}`);
 
        selectionMode = false; selectedImages.clear(); updateSelectionUI();
        if (window.innerWidth <= 768) closeSidebar();
 
        // إعادة تعيين الفرز والعرض
        currentSort = 'newest';

    // ====== Browser history ======

        const state = event.state;
        const lb = document.getElementById('lightbox');

        const newType = state?.type || 'home';
        if (lbOpen && newType !== 'lightbox') {
            lb.classList.remove('active'); document.body.style.overflow = '';
            if (newType === 'folder' && navigationPath.length > 0) return;
            if (newType === 'home' && navigationPath.length === 0) return;

        else if (newType === 'folder' && state.path?.length > 0) {
            const path = state.path; navigationPath = path.slice(0, -1);

    // ====== Download ZIP ======
    async function downloadSelectedAsZip() {
        if (selectedImages.size === 0) { showToast('لم تحدد أي صور', 'error'); return; }
        const overlay   = document.getElementById('progressOverlay');
        const fill      = document.getElementById('progressFill');
        const ptitle    = document.getElementById('progressTitle');
        const psub      = document.getElementById('progressSubtitle');
        overlay.classList.add('active');
        ptitle.innerText = '📦 جاري تجهيز الصور...';
        psub.innerText   = `0 من ${selectedImages.size}`;
        fill.style.width = '0%';
 
        const zip    = new JSZip();
        const folder = zip.folder(currentFolderName || 'images');
        const imgs   = currentImages.filter(img => selectedImages.has(img.id));
        let completed = 0, failed = 0;
 
        for (const img of imgs) {
            try {
                const r = await fetch(`https://drive.google.com/thumbnail?id=${img.id}&sz=w2000`);
                if (r.ok) { folder.file(img.name, await r.blob()); completed++; }
                else failed++;
            } catch { failed++; }
            fill.style.width = `${((completed + failed) / imgs.length) * 100}%`;
            psub.innerText   = `${completed + failed} من ${imgs.length}`;
        }
 
        ptitle.innerText = '🗜️ جاري ضغط الملفات...';
        try {
            const content = await zip.generateAsync({ type: 'blob' }, m => { fill.style.width = `${m.percent.toFixed(0)}%`; });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `${currentFolderName || 'images'}.zip`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            overlay.classList.remove('active');
            showToast(failed > 0 ? `تم تنزيل ${completed} صورة (فشل ${failed})` : `تم تنزيل ${completed} صورة بنجاح ✨`, 'success');
            selectionMode = false; selectedImages.clear(); updateSelectionUI(); renderImagesGrid();
        } catch {
            overlay.classList.remove('active');
            showToast('حدث خطأ أثناء الضغط', 'error');
        }
    }

    // اختصار سريع: / للتركيز على بحث الصور
    document.addEventListener('keydown', (e) => {

    // Touch swipe + zoom
    let touchStartX = 0, touchStartY = 0;
    let lbScale = 1, lbTransX = 0, lbTransY = 0;
    let lbLastTap = 0;
    let pinchStartDist = 0, pinchStartScale = 1;
    let isDragging = false, dragStartX = 0, dragStartY = 0, dragStartTX = 0, dragStartTY = 0;

    function lbApplyTransform(animated = false) {
        const img = document.getElementById('lightboxImg');
        img.style.transition = animated ? 'transform 0.3s ease, opacity 0.2s ease' : 'opacity 0.2s ease';
        img.style.transform = `scale(${lbScale}) translate(${lbTransX}px, ${lbTransY}px)`;
        img.classList.toggle('zoomed', lbScale > 1);
        // تحديث زر الـ reset بنسبة التكبير
        const resetBtn = document.getElementById('lightboxZoomReset');
        if (resetBtn) resetBtn.textContent = lbScale === 1 ? '1×' : `${lbScale.toFixed(1)}×`;
    }

    function lbResetZoom(animated = true) {
        lbScale = 1; lbTransX = 0; lbTransY = 0;
        lbApplyTransform(animated);
    }

    function lbZoomIn() {
        lbScale = Math.min(5, parseFloat((lbScale * 1.4).toFixed(2)));
        lbApplyTransform(true);
    }

    function lbZoomOut() {
        lbScale = Math.max(1, parseFloat((lbScale / 1.4).toFixed(2)));
        if (lbScale <= 1.05) { lbScale = 1; lbTransX = 0; lbTransY = 0; }
        lbApplyTransform(true);
    }

    const lbEl = document.getElementById('lightbox');
    const lbBody = document.getElementById('lightbox').querySelector('.lightbox-body');

    // Double-tap / double-click to zoom
    lbEl.addEventListener('dblclick', (e) => {
        if (e.target.closest('.lightbox-nav') || e.target.closest('.lightbox-btn')) return;
        if (lbScale > 1) { lbResetZoom(); } else { lbScale = 2.5; lbApplyTransform(true); }
    });

    lbEl.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            // double-tap detection
            const now = Date.now();
            if (now - lbLastTap < 300) {
                if (lbScale > 1) lbResetZoom(); else { lbScale = 2.5; lbApplyTransform(true); }
                lbLastTap = 0;
            } else { lbLastTap = now; }
        } else if (e.touches.length === 2) {
            // pinch start
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStartDist  = Math.hypot(dx, dy);
            pinchStartScale = lbScale;
        }
    }, { passive: true });

    lbEl.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dx   = e.touches[0].clientX - e.touches[1].clientX;
            const dy   = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            lbScale = Math.min(5, Math.max(1, pinchStartScale * (dist / pinchStartDist)));
            lbApplyTransform();
        } else if (e.touches.length === 1 && lbScale > 1) {
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            lbTransX += dx / lbScale; lbTransY += dy / lbScale;
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            lbApplyTransform();
        }
    }, { passive: false });

            // swipe navigation only when not zoomed

            const diffY = Math.abs(e.changedTouches[0].screenY - touchStartY);
            if (Math.abs(diff) > 50 && diffY < 80) navigateLightbox(diff > 0 ? 1 : -1);

    lbEl.addEventListener('wheel', e => {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.85 : 1.15;
        lbScale = Math.min(5, Math.max(1, lbScale * delta));
        if (lbScale <= 1) { lbScale = 1; lbTransX = 0; lbTransY = 0; }
        lbApplyTransform();
    }, { passive: false });

    lbEl.addEventListener('mousedown', e => {
        if (lbScale <= 1 || e.target.closest('.lightbox-nav') || e.target.closest('.lightbox-btn')) return;

        dragStartTX = lbTransX; dragStartTY = lbTransY;
        lbBody.classList.add('dragging');
    });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        lbTransX = dragStartTX + (e.clientX - dragStartX) / lbScale;
        lbTransY = dragStartTY + (e.clientY - dragStartY) / lbScale;
        lbApplyTransform();
    });
    window.addEventListener('mouseup', () => { isDragging = false; lbBody?.classList.remove('dragging'); });
 
    // ====== Share ======
    async function shareImage(imageId, imageName) {
        const fetchUrl = `https://drive.google.com/thumbnail?id=${imageId}&sz=w2000`;

        // --- المحاولة الأولى: مشاركة الملف الفعلي عبر Web Share ---
        if (typeof navigator.share === 'function') {
            try {
                showToast('جاري تجهيز الصورة للمشاركة...', 'success');
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error('fetch_failed');
                const blob = await response.blob();
                const ext  = blob.type.split('/')[1]?.split(';')[0] || 'jpg';
                const safeExt = ['jpeg','jpg','png','gif','webp','heic'].includes(ext) ? (ext === 'jpeg' ? 'jpg' : ext) : 'jpg';
                const fileName = imageName.replace(/\.[^.]*$/, '') + '.' + safeExt;
                const file = new File([blob], fileName, { type: blob.type || 'image/jpeg', lastModified: Date.now() });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: imageName, text: 'مشاركة صورة' });
                    return;
                }
            } catch (e) {
                if (e.name === 'AbortError') return; // المستخدم ألغى
            }
        }

        // --- fallback: تنزيل الملف محليًا ليمكن مشاركته من أي تطبيق ---
        try {
            const response = await fetch(fetchUrl);
            if (response.ok) {
                const blob    = await response.blob();
                const ext     = blob.type.split('/')[1]?.split(';')[0] || 'jpg';
                const safeExt = ext === 'jpeg' ? 'jpg' : ext;
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = imageName.replace(/\.[^.]*$/, '') + '.' + safeExt;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
                showToast('تم تنزيل الصورة. يمكنك الآن مشاركتها من أي تطبيق 📤', 'success');
                return;
            }
        } catch(e) { /* استمر */ }

        // --- fallback أخير: نسخ الرابط ---
        const driveUrl = `https://drive.google.com/file/d/${imageId}/view`;
        try {
            await navigator.clipboard.writeText(driveUrl);
            showToast('تعذر مشاركة الملف، تم نسخ الرابط كبديل 📋', 'success');
        } catch {
            showToast('تعذّرت المشاركة', 'error');
        }
    }
