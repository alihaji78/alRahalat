<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معرض قروب الرحلات الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        :root { 
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --bg-glass-strong: rgba(255, 255, 255, 0.85);
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-muted: #999;
            --border: rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.12);
            --accent: #000000;
            --accent-text: #ffffff;
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-bg: linear-gradient(135deg, #f0f2f5 0%, #e8eef5 50%, #f0f2f5 100%);
            --hover-bg: rgba(0, 0, 0, 0.04);
            --danger: #ff3b30;
            --success: #34c759;
            --sidebar-width: 300px;
        }
        
        [data-theme="dark"] {
            --bg-primary: #0a0a0f;
            --bg-secondary: #16161d;
            --bg-glass: rgba(22, 22, 29, 0.7);
            --bg-glass-strong: rgba(22, 22, 29, 0.9);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --border: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.5);
            --accent: #ffffff;
            --accent-text: #000000;
            --gradient-bg: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
            --hover-bg: rgba(255, 255, 255, 0.06);
        }
        
        html, body { height: 100%; overflow-x: hidden; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--gradient-bg);
            color: var(--text-primary); 
            direction: rtl; 
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(240, 147, 251, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        [data-theme="dark"] body::before {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(240, 147, 251, 0.08) 0%, transparent 50%);
        }
        
        .nav { 
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: var(--text-primary); 
            height: 70px; 
            display: flex; 
            align-items: center; 
            padding: 0 18px; 
            position: sticky; 
            top: 0; 
            z-index: 1001; 
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .nav-side { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-title { 
            flex: 1; 
            text-align: center; 
            font-weight: 800; 
            font-size: 18px; 
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }
        .btn-nav { 
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); 
            border: 1px solid var(--border);
            width: 44px; 
            height: 44px; 
            border-radius: 14px; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.25s ease;
        }
        .btn-nav:hover, .btn-nav:active { 
            background: var(--hover-bg);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .btn-nav svg { 
            width: 22px; height: 22px; 
            fill: none; stroke: currentColor; 
            stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; 
        }

        .layout {
            display: flex;
            flex-direction: row;
            min-height: calc(100vh - 70px);
            position: relative;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-left: 1px solid var(--border);
            position: sticky;
            top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
            overflow-x: hidden;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
        }
        
        .sidebar-header {
            padding: 20px 20px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .sidebar-header h3 {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header p {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }
        
        .search-box { position: relative; margin-top: 12px; }
        .search-input {
            width: 100%;
            padding: 10px 38px 10px 14px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            direction: rtl;
        }
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .sidebar-list { padding: 10px; }
        
        .folder-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 5px;
            border: 1px solid transparent;
            user-select: none;
            position: relative;
            overflow: hidden;
        }
        .folder-item:hover {
            background: var(--hover-bg);
            transform: translateX(-3px);
        }
        .folder-item.active {
            background: var(--accent);
            color: var(--accent-text);
            box-shadow: var(--shadow-md);
            transform: translateX(-3px);
        }
        .folder-item.active .folder-item-count {
            background: rgba(255,255,255,0.2);
            color: var(--accent-text);
        }
        [data-theme="dark"] .folder-item.active .folder-item-count {
            background: rgba(0,0,0,0.2);
        }
        .folder-item.hidden-el { display: none; }
        
        .folder-item-icon {
            font-size: 24px;
            flex-shrink: 0;
            width: 32px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .folder-item-content { flex: 1; min-width: 0; position: relative; z-index: 1; }
        .folder-item-name {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .folder-item-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 8px;
            display: inline-block;
            font-weight: 700;
        }
        
        .main-content {
            flex: 1;
            padding: 22px;
            min-width: 0;
            max-width: 100%;
        }
        
        /* ====== Breadcrumb ====== */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
        }
        .breadcrumb-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            font-family: 'Cairo', sans-serif;
        }
        .breadcrumb-item:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }
        .breadcrumb-item.current {
            color: var(--text-primary);
            background: var(--hover-bg);
            cursor: default;
        }
        .breadcrumb-item svg {
            width: 14px; height: 14px;
            fill: none; stroke: currentColor;
            stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
        }
        .breadcrumb-separator {
            color: var(--text-muted);
            font-size: 14px;
            user-select: none;
        }
        
        .content-header {
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 22px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
        }
        .content-header-info {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
            flex: 1;
        }
        .content-header-icon { font-size: 32px; flex-shrink: 0; }
        .content-header-text { min-width: 0; flex: 1; }
        .content-header-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .content-header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }
        
        .content-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 14px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn-action:hover {
            background: var(--hover-bg);
            transform: translateY(-1px);
        }
        .btn-action.primary {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
        }
        .btn-action.primary:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-action svg {
            width: 14px; height: 14px;
            fill: none; stroke: currentColor;
            stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
        }
        
        .filter-bar {
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }
        .filter-search { flex: 1; position: relative; min-width: 0; }
        .filter-search .search-input { padding: 9px 36px 9px 12px; }
        .filter-search .search-icon { width: 15px; height: 15px; }
        
        /* ====== Folders Grid (للمجلدات الفرعية) ====== */
        .section-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        .section-title:first-child { margin-top: 0; }
        
        .folders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }
        
        .folder-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.4s ease backwards;
            position: relative;
            overflow: hidden;
        }
        .folder-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 0;
        }
        .folder-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(102, 126, 234, 0.4);
        }
        .folder-card:hover::before {
            opacity: 0.05;
        }
        .folder-card-icon {
            font-size: 44px;
            display: block;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        .folder-card-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }
        .folder-card-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }
        
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }
        
        .skeleton-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }
        .skeleton-img {
            width: 100%;
            height: 240px;
            background: linear-gradient(90deg, 
                var(--bg-primary) 0%, 
                var(--hover-bg) 50%, 
                var(--bg-primary) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-info { padding: 14px; }
        .skeleton-line {
            height: 12px;
            background: linear-gradient(90deg, 
                var(--bg-primary) 0%, 
                var(--hover-bg) 50%, 
                var(--bg-primary) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .skeleton-line:last-child { width: 60%; margin-bottom: 0; }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .image-card { 
            background: var(--bg-secondary);
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            animation: fadeIn 0.5s ease backwards;
        }
        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(102, 126, 234, 0.3);
        }
        .image-card.selected {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3), var(--shadow-md);
        }
        
        .img-checkbox {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--bg-glass-strong);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .img-checkbox.active { background: #667eea; border-color: white; }
        .img-checkbox svg {
            width: 16px; height: 16px;
            fill: none; stroke: white;
            stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .img-checkbox.active svg { opacity: 1; }
        .selection-mode .img-checkbox { display: flex; }
        
        .img-container { 
            width: 100%; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 240px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        .img-container img { 
            width: 100%; 
            height: auto; 
            max-height: 500px;
            display: block; 
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .img-container img.loaded { opacity: 1; }
        .img-container:hover img.loaded { transform: scale(1.03); }
        
        .img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
        }
        .img-container:hover .img-overlay { opacity: 1; }
        .img-overlay span {
            color: white;
            font-size: 12px;
            font-weight: 700;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .img-overlay svg {
            width: 14px; height: 14px;
            fill: none; stroke: white; stroke-width: 2.5;
        }
        
        .img-info { 
            padding: 14px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: 10px;
        }
        .img-name {
            font-size: 12px; 
            color: var(--text-secondary); 
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }
        .btn-download { 
            background: var(--accent);
            color: var(--accent-text);
            text-decoration: none; 
            padding: 8px 14px; 
            border-radius: 10px; 
            font-size: 12px; 
            font-weight: 700;
            flex-shrink: 0;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
        }
        .btn-download:hover { 
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .btn-download svg { 
            width: 13px; height: 13px; 
            fill: none; stroke: currentColor; 
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; 
        }

        .empty-state { 
            text-align: center; 
            padding: 70px 20px; 
            color: var(--text-muted); 
            grid-column: 1/-1;
            font-size: 14px;
            animation: fadeIn 0.5s ease;
        }
        .empty-state-icon {
            font-size: 70px;
            margin-bottom: 18px;
            opacity: 0.4;
        }
        .empty-state-title {
            font-size: 19px;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .sidebar-loader, .sidebar-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
        }
        
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        .lightbox.active { display: flex; }
        
        .lightbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            flex-shrink: 0;
            z-index: 10;
            gap: 10px;
        }
        .lightbox-title {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }
        .lightbox-counter {
            font-size: 12px;
            font-weight: 700;
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .lightbox-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .lightbox-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
        }
        .lightbox-btn:hover { background: rgba(255,255,255,0.2); }
        .lightbox-btn svg {
            width: 20px; height: 20px;
            fill: none; stroke: currentColor;
            stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
        }
        
        .lightbox-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }
        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            animation: scaleIn 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
            transition: opacity 0.2s ease;
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 5;

        .lightbox-nav:hover:not(:disabled) {
            background: rgba(255,255,255,0.25);
            transform: translateY(-50%) scale(1.1);

        .lightbox-nav.prev { right: 20px; }
        .lightbox-nav.next { left: 20px; }
        .lightbox-nav svg {
            width: 24px; height: 24px;
            fill: none; stroke: currentColor;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }
        .lightbox-nav:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);

            padding: 14px 22px;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            font-size: 13px;
            font-weight: 700;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 90%;

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast-icon {
            width: 20px; height: 20px;
            flex-shrink: 0;
            fill: none; stroke: currentColor;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }
        .toast.success .toast-icon { stroke: var(--success); }
        .toast.error .toast-icon { stroke: var(--danger); }
        
        .progress-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 2500;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        .progress-overlay.active { display: flex; }
        .progress-box {
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            min-width: 300px;
            max-width: 90%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }
        .progress-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .progress-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 600;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            width: 0%;

            border-radius: 4px;

        .sidebar-toggle { display: none; }
        
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;

        .sidebar::-webkit-scrollbar { width: 6px; }

        /* ====== Memories Section (الذكريات) ====== */
        .memories-hero {
            position: relative;
            background: var(--gradient-primary);

            inset: 0;

                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);

        .memories-hero-content {
            position: relative;

        .memories-hero-badge {

        .memories-hero-icon {
            font-size: 36px;

        /* Memory Year Group */

            margin-bottom: 28px;

        .memory-year-header {
            display: flex;

        /* Memory Card - شبيه بصورة Polaroid */
        .memory-card {
            position: relative;

        }
        .memory-card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);

            font-weight: 800;

            align-items: center;

        }
        .memory-card-badge svg {

            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }
        .memory-card-folder {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }
        
        /* Loading state for memories */
        .memories-loading {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }
        .memories-loading-spinner {
            width: 40px;
            height: 40px;

            border-radius: 50%;

            margin: 0 auto 16px;
        }

            to { transform: rotate(360deg); }
        }
        .memories-loading-text {
            font-size: 14px;
            font-weight: 600;
        }
        .memories-loading-progress {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .memories-empty {
            text-align: center;
            padding: 50px 20px;
            background: var(--bg-glass-strong);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        .memories-empty-icon {
            font-size: 60px;
            margin-bottom: 14px;
            opacity: 0.5;
        }
        .memories-empty-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .memories-empty-text {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        @media (max-width: 900px) {
            :root { --sidebar-width: 270px; }
            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 14px;
            }
            .main-content { padding: 16px; }
            .folders-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                height: 100vh;
                width: 85%;
                max-width: 320px;
                transform: translateX(100%);
                box-shadow: -5px 0 30px rgba(0,0,0,0.2);
                z-index: 1002;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-toggle { display: flex; }
            .main-content { padding: 14px; width: 100%; }
            .content-header { padding: 14px 16px; border-radius: 16px; }
            .content-header-icon { font-size: 26px; }
            .content-header-title { font-size: 15px; }
            .content-header-subtitle { font-size: 11px; }
            .images-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .folders-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }
            .folder-card { padding: 14px 8px; }
            .folder-card-icon { font-size: 36px; }
            .folder-card-name { font-size: 12px; }
            .img-container { min-height: 220px; }
            .img-container img { max-height: 70vh; }
            .lightbox-nav.prev { right: 10px; }
            .lightbox-nav.next { left: 10px; }
            .lightbox-nav { width: 42px; height: 42px; }
            .filter-bar { padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
            .breadcrumb { padding: 8px 12px; }
            .breadcrumb-item { font-size: 11px; padding: 4px 8px; }
        }
        
        @media (max-width: 400px) {
            .nav-title { font-size: 15px; }
            .main-content { padding: 10px; }
            .content-header { padding: 12px 14px; gap: 10px; }
            .content-actions { width: 100%; justify-content: flex-start; }
            .btn-action { padding: 8px 12px; font-size: 11px; }
            .lightbox-title { font-size: 12px; }
            .lightbox-btn { width: 36px; height: 36px; }
            .lightbox-counter { font-size: 11px; padding: 5px 10px; }
        }
        
        @supports (-webkit-touch-callout: none) {
            .sidebar { -webkit-overflow-scrolling: touch; }
            body { -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body>

<div class="nav">
    <div class="nav-side">

<div class="layout">
