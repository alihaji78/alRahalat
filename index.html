<script>
    const API_KEY = 'AIzaSyCv3v7LHte7hTY82NmUmj9OJLxR0zFY0bU'; 
    const ROOT_FOLDER_ID = '1r0VfqjSzznFHhqMYFhB5bPzCeW92YFHa';
    
    let allFolders = [];
    let currentFolderId = null;
    let currentFolderName = '';
    let currentImages = [];
    let currentSubFolders = [];
    let filteredImages = [];
    let selectionMode = false;
    let selectedImages = new Set();
    let lightboxIndex = 0;
    let lightboxImages = [];
    // مسار التنقل: مصفوفة من {id, name}
    let navigationPath = [];
    
    // ====== Theme ======
    function initTheme() {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        updateThemeIcon(saved);
    }
    
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    }
    
    function updateThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        icon.setAttribute('fill', 'none');
        icon.setAttribute('stroke', 'currentColor');
        icon.setAttribute('stroke-width', '2.2');
        icon.setAttribute('stroke-linecap', 'round');
        icon.setAttribute('stroke-linejoin', 'round');
        if (theme === 'dark') {
            icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        } else {
            icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        }
    }
    
    // ====== Sidebar Folders (المجلدات الرئيسية فقط) ======
    async function loadSidebarFolders() {
        const sidebarList = document.getElementById('sidebarList');
        const url = `https://www.googleapis.com/drive/v3/files?q='${ROOT_FOLDER_ID}'+in+parents+and+trashed=false+and+mimeType='application/vnd.google-apps.folder'&fields=files(id,name,mimeType)&key=${API_KEY}&orderBy=name`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (!data.files || data.files.length === 0) {
                sidebarList.innerHTML = '<div class="sidebar-empty">لا توجد مجلدات</div>';
                document.getElementById('sidebarSubtitle').innerText = '0 مجلد';
                return;
            }
            
            allFolders = data.files;
            document.getElementById('sidebarSubtitle').innerText = `${allFolders.length} مجلد رئيسي`;
            renderSidebar();
            
            allFolders.forEach(folder => updateFolderItemCount(folder.id));
        } catch (e) {
            sidebarList.innerHTML = '<div class="sidebar-empty">⚠️ حدث خطأ في التحميل</div>';
        }
    }
    
    function renderSidebar() {
        const sidebarList = document.getElementById('sidebarList');
        sidebarList.innerHTML = '';
        
        allFolders.forEach((folder, i) => {
            const item = document.createElement('div');
            item.className = 'folder-item';
            item.id = `folder-${folder.id}`;
            item.dataset.name = folder.name.toLowerCase();
            item.style.animationDelay = `${i * 30}ms`;
            item.style.animation = 'fadeIn 0.4s ease backwards';
            item.onclick = () => openFolder(folder.id, folder.name, true);
            
            item.innerHTML = `
                <span class="folder-item-icon">📁</span>
                <div class="folder-item-content">
                    <div class="folder-item-name">${escapeHtml(folder.name)}</div>
                    <span class="folder-item-count" id="count-${folder.id}">...</span>
                </div>
            `;
            sidebarList.appendChild(item);
        });
    }
    
    async function updateFolderItemCount(folderId) {
        try {
            const files = await fetchAllFilesInFolder(folderId, 'files(id,mimeType)');
            const el = document.getElementById(`count-${folderId}`);
            if (el) {
                const images = files.filter(f => f.mimeType && f.mimeType.startsWith('image/')).length;
                const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder').length;
                
                let text = '';
                if (folders > 0 && images > 0) {
                    text = `${folders} مجلد، ${images} صورة`;
                } else if (folders > 0) {
                    text = `${folders} مجلد فرعي`;
                } else if (images > 0) {
                    text = `${images} صورة`;
                } else {
                    text = 'فارغ';
                }
                el.innerText = text;
            }
        } catch (e) { }
    }
    
    function filterFolders() {
        const query = document.getElementById('folderSearch').value.toLowerCase().trim();
        document.querySelectorAll('.folder-item').forEach(item => {
            const name = item.dataset.name || '';
            if (name.includes(query)) item.classList.remove('hidden-el');
            else item.classList.add('hidden-el');
        });
    }
    
    function filterImages() {
        const query = document.getElementById('imageFilter').value.toLowerCase().trim();
        filteredImages = currentImages.filter(img => img.name.toLowerCase().includes(query));
        renderImagesGrid();
    }
    
    // ====== دالة مساعدة: جلب كل الملفات مع pagination ======
    async function fetchAllFilesInFolder(folderId, fields, orderBy = '') {
        let allFiles = [];
        let pageToken = null;
        
        do {
            let url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,${fields}&key=${API_KEY}&pageSize=1000`;
            if (orderBy) url += `&orderBy=${orderBy}`;
            if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.files) allFiles = allFiles.concat(data.files);
            pageToken = data.nextPageToken || null;
        } while (pageToken);
        
        return allFiles;
    }
    
    // ====== فتح مجلد (رئيسي أو فرعي) ======
    // isRootLevel: هل هذا مجلد من القائمة الجانبية؟
    // skipHistory: إذا true، لا نضيف للتاريخ (يستخدم عند الرجوع من زر المتصفح)
    async function openFolder(folderId, folderName, isRootLevel = false, skipHistory = false) {
        // إذا الـ lightbox مفتوح، نقفله أولاً (بدون ما نأثر على التاريخ)
        const lightbox = document.getElementById('lightbox');
        if (lightbox.classList.contains('active')) {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        currentFolderId = folderId;
        currentFolderName = folderName;
        
        // بناء مسار التنقل
        if (isRootLevel) {
            navigationPath = [{ id: folderId, name: folderName }];
            
            document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.getElementById(`folder-${folderId}`);
            if (activeItem) activeItem.classList.add('active');
        } else {
            navigationPath.push({ id: folderId, name: folderName });
        }
        
        // إضافة للتاريخ
        if (!skipHistory) {
            history.pushState(
                { type: 'folder', path: [...navigationPath] }, 
                folderName, 
                `#${encodeURIComponent(folderName)}`
            );
        }
        
        selectionMode = false;
        selectedImages.clear();
        updateSelectionUI();
        
        if (window.innerWidth <= 768) closeSidebar();
        
        // إخفاء الحالة الفارغة الافتراضية
        document.getElementById('defaultEmptyState').classList.add('hidden-el');
        
        // عرض الـ breadcrumb والـ header
        renderBreadcrumb();
        document.getElementById('breadcrumb').classList.remove('hidden-el');
        
        const contentHeader = document.getElementById('contentHeader');
        contentHeader.classList.remove('hidden-el');
        document.getElementById('currentFolderName').innerText = folderName;
        document.getElementById('currentFolderCount').innerText = 'جاري التحميل...';
        document.getElementById('imageFilter').value = '';
        
        // إخفاء الأقسام أثناء التحميل
        document.getElementById('subFoldersSection').classList.add('hidden-el');
        document.getElementById('imagesSection').classList.remove('hidden-el');
        document.getElementById('filterBar').classList.add('hidden-el');
        
        showSkeletonLoader();
        
        // جلب كل المحتوى (مجلدات وصور) مع pagination
        try {
            const files = await fetchAllFilesInFolder(folderId, 'files(id,name,mimeType)', 'folder,name');
            
            // فصل المجلدات والصور
            currentSubFolders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
            currentImages = files.filter(f => f.mimeType && f.mimeType.startsWith('image/'));
            filteredImages = [...currentImages];
            
            renderContent();
        } catch (e) {
            document.getElementById('displayArea').innerHTML = 
                '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">حدث خطأ</div><div>تعذر تحميل المحتوى. حاول مرة أخرى.</div></div>';
            document.getElementById('currentFolderCount').innerText = 'خطأ في التحميل';
        }
    }
    
    function renderBreadcrumb() {
        const breadcrumb = document.getElementById('breadcrumb');
        breadcrumb.innerHTML = '';
        
        // زر الرئيسية
        const homeBtn = document.createElement('button');
        homeBtn.className = 'breadcrumb-item';
        homeBtn.onclick = goHome;
        homeBtn.innerHTML = `
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            الرئيسية
        `;
        breadcrumb.appendChild(homeBtn);
        
        // كل مستوى في المسار
        navigationPath.forEach((level, i) => {
            const sep = document.createElement('span');
            sep.className = 'breadcrumb-separator';
            sep.innerHTML = '‹';
            breadcrumb.appendChild(sep);
            
            const item = document.createElement('button');
            item.className = 'breadcrumb-item';
            if (i === navigationPath.length - 1) {
                item.classList.add('current');
            } else {
                item.onclick = () => navigateToPath(i);
            }
            item.innerText = level.name;
            breadcrumb.appendChild(item);
        });
    }
    
    function navigateToPath(index, skipHistory = false) {
        // الرجوع لمستوى معين في المسار
        const target = navigationPath[index];
        navigationPath = navigationPath.slice(0, index);
        openFolder(target.id, target.name, index === 0, skipHistory);
    }
    
    function goHome(skipHistory = false) {
        // إذا الـ lightbox مفتوح، نقفله
        const lightbox = document.getElementById('lightbox');
        if (lightbox.classList.contains('active')) {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        navigationPath = [];
        currentFolderId = null;
        currentFolderName = '';
        currentImages = [];
        currentSubFolders = [];
        filteredImages = [];
        selectionMode = false;
        selectedImages.clear();
        
        document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('active'));
        document.getElementById('breadcrumb').classList.add('hidden-el');
        document.getElementById('contentHeader').classList.add('hidden-el');
        document.getElementById('filterBar').classList.add('hidden-el');
        document.getElementById('subFoldersSection').classList.add('hidden-el');
        document.getElementById('imagesSection').classList.add('hidden-el');
        document.getElementById('defaultEmptyState').classList.remove('hidden-el');
        
        // إعادة عرض الذكريات من الكاش
        const cached = getCachedMemories();
        if (cached) {
            renderMemories(cached);
        }
        
        // إضافة للتاريخ
        if (!skipHistory) {
            history.pushState({ type: 'home' }, '', window.location.pathname);
        }
    }
    
    // ====== Browser Back/Forward Button Support ======
    window.addEventListener('popstate', (event) => {
        const state = event.state;
        const lightbox = document.getElementById('lightbox');
        const lightboxOpen = lightbox.classList.contains('active');
        
        // الحالة الجديدة بعد الرجوع
        const newType = state?.type || 'home';
        
        // إذا الـ lightbox مفتوح والحالة الجديدة مو lightbox، نقفله
        if (lightboxOpen && newType !== 'lightbox') {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            // إذا الحالة الجديدة نفس مكاننا (مجلد أو home)، لا نحتاج نفعل شيء إضافي
            if (newType === 'folder' && navigationPath.length > 0) {
                // نحن فعلاً داخل نفس المجلد، الـ lightbox كان فوقه
                return;
            }
            if (newType === 'home' && navigationPath.length === 0) {
                return;
            }
        }
        
        // التنقل حسب نوع الحالة الجديدة
        if (newType === 'home') {
            if (navigationPath.length > 0 || lightboxOpen) {
                goHome(true);
            }
        } else if (newType === 'folder' && state.path && state.path.length > 0) {
            const path = state.path;
            navigationPath = path.slice(0, -1);
            const lastFolder = path[path.length - 1];
            const isRoot = path.length === 1;
            openFolder(lastFolder.id, lastFolder.name, isRoot, true);
        } else if (newType === 'lightbox') {
            // هذا يحدث لو الشخص رجع للأمام للـ lightbox - نادراً ما يحدث
            // نتجاهله لأن الـ lightbox يفتح بالضغط فقط
        }
    });
    
    function showSkeletonLoader() {
        const displayArea = document.getElementById('displayArea');
        displayArea.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const skel = document.createElement('div');
            skel.className = 'skeleton-card';
            skel.innerHTML = `
                <div class="skeleton-img"></div>
                <div class="skeleton-info">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                </div>
            `;
            displayArea.appendChild(skel);
        }
    }
    
    // ====== عرض المحتوى (مجلدات فرعية + صور) ======
    function renderContent() {
        const hasSubFolders = currentSubFolders.length > 0;
        const hasImages = currentImages.length > 0;
        
        // تحديث العداد في الـ header
        let countText = '';
        if (hasSubFolders && hasImages) {
            countText = `${currentSubFolders.length} مجلد، ${currentImages.length} صورة`;
        } else if (hasSubFolders) {
            countText = `${currentSubFolders.length} مجلد فرعي`;
        } else if (hasImages) {
            countText = `${currentImages.length} صورة`;
        } else {
            countText = 'مجلد فارغ';
        }
        document.getElementById('currentFolderCount').innerText = countText;
        
        // عرض المجلدات الفرعية
        if (hasSubFolders) {
            document.getElementById('subFoldersSection').classList.remove('hidden-el');
            renderSubFolders();
        } else {
            document.getElementById('subFoldersSection').classList.add('hidden-el');
        }
        
        // عرض الصور
        if (hasImages) {
            document.getElementById('imagesSection').classList.remove('hidden-el');
            document.getElementById('filterBar').classList.remove('hidden-el');
            // إظهار أزرار التحديد فقط لو فيه صور
            document.getElementById('contentActions').style.display = 'flex';
            renderImagesGrid();
        } else {
            document.getElementById('filterBar').classList.add('hidden-el');
            document.getElementById('contentActions').style.display = 'none';
            
            // لو ما فيه مجلدات ولا صور
            if (!hasSubFolders) {
                document.getElementById('imagesSection').classList.remove('hidden-el');
                document.getElementById('displayArea').innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-title">مجلد فارغ</div><div>هذا المجلد لا يحتوي على أي محتوى</div></div>';
            } else {
                document.getElementById('imagesSection').classList.add('hidden-el');
            }
        }
        
        // تحميل عدد العناصر لكل مجلد فرعي
        currentSubFolders.forEach(f => updateSubFolderCount(f.id));
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
    
    function renderSubFolders() {
        const grid = document.getElementById('subFoldersGrid');
        grid.innerHTML = '';
        
        currentSubFolders.forEach((folder, i) => {
            const card = document.createElement('div');
            card.className = 'folder-card';
            card.style.animationDelay = `${Math.min(i * 40, 400)}ms`;
            card.onclick = () => openFolder(folder.id, folder.name, false);
            
            card.innerHTML = `
                <span class="folder-card-icon">📁</span>
                <div class="folder-card-name">${escapeHtml(folder.name)}</div>
                <span class="folder-card-count" id="subcount-${folder.id}">...</span>
            `;
            grid.appendChild(card);
        });
    }
    
    async function updateSubFolderCount(folderId) {
        try {
            const files = await fetchAllFilesInFolder(folderId, 'files(id,mimeType)');
            const el = document.getElementById(`subcount-${folderId}`);
            if (el) {
                const images = files.filter(f => f.mimeType && f.mimeType.startsWith('image/')).length;
                const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder').length;
                
                let text = '';
                if (folders > 0 && images > 0) text = `${folders} مجلد، ${images} صورة`;
                else if (folders > 0) text = `${folders} مجلد`;
                else if (images > 0) text = `${images} صورة`;
                else text = 'فارغ';
                
                el.innerText = text;
            }
        } catch (e) { }
    }
    
    function renderImagesGrid() {
        const displayArea = document.getElementById('displayArea');
        displayArea.innerHTML = '';
        
        // تحديث عدد الصور المفلترة
        const sectionTitle = document.getElementById('imagesSectionTitle');
        if (filteredImages.length !== currentImages.length) {
            sectionTitle.innerText = `🖼️ الصور (${filteredImages.length} من ${currentImages.length})`;
        } else {
            sectionTitle.innerText = `🖼️ الصور (${currentImages.length})`;
        }
        
        if (filteredImages.length === 0) {
            if (currentImages.length > 0) {
                displayArea.innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">لا توجد نتائج</div><div>لم نعثر على صور تطابق بحثك</div></div>';
            }
            return;
        }
        
        filteredImages.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.dataset.id = p.id;
            card.style.animationDelay = `${Math.min(i * 50, 500)}ms`;
            
            if (selectedImages.has(p.id)) card.classList.add('selected');
            
            card.innerHTML = `
                <div class="img-checkbox ${selectedImages.has(p.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleSelection('${p.id}')">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="img-container" onclick="handleImageClick('${p.id}', ${i})">
                    <img src="https://drive.google.com/thumbnail?id=${p.id}&sz=w1200" loading="lazy" alt="${escapeHtml(p.name)}" onload="this.classList.add('loaded')">
                    <div class="img-overlay">
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"/>
                            </svg>
                            عرض بالحجم الكامل
                        </span>
                    </div>
                </div>
                <div class="img-info">
                    <span class="img-name">${escapeHtml(p.name)}</span>
                    <a href="https://drive.google.com/uc?export=download&id=${p.id}" target="_blank" class="btn-download" onclick="event.stopPropagation()">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        حفظ
                    </a>
                </div>
            `;
            displayArea.appendChild(card);
        });
        
        if (selectionMode) {
            displayArea.classList.add('selection-mode');
        }
    }
    
    function handleImageClick(id, index) {
        if (selectionMode) {
            toggleSelection(id);
        } else {
            openLightbox(index);
        }
    }
    
    function toggleSelectionMode() {
        selectionMode = !selectionMode;
        updateSelectionUI();
    }
    
    function updateSelectionUI() {
        const displayArea = document.getElementById('displayArea');
        const selectBtnText = document.getElementById('selectBtnText');
        const downloadBtn = document.getElementById('downloadZipBtn');
        const downloadText = document.getElementById('downloadZipText');
        
        if (selectionMode) {
            displayArea.classList.add('selection-mode');
            selectBtnText.innerText = 'إلغاء';
        } else {
            displayArea.classList.remove('selection-mode');
            selectBtnText.innerText = 'تحديد';
            selectedImages.clear();
            document.querySelectorAll('.image-card').forEach(c => c.classList.remove('selected'));
            document.querySelectorAll('.img-checkbox').forEach(c => c.classList.remove('active'));
        }
        
        if (selectedImages.size > 0) {
            downloadBtn.classList.remove('hidden-el');
            downloadText.innerText = `تنزيل (${selectedImages.size})`;
        } else {
            downloadBtn.classList.add('hidden-el');
        }
    }
    
    function toggleSelection(id) {
        if (!selectionMode) {
            selectionMode = true;
            document.getElementById('displayArea').classList.add('selection-mode');
            document.getElementById('selectBtnText').innerText = 'إلغاء';
        }
        
        const card = document.querySelector(`.image-card[data-id="${id}"]`);
        if (!card) return;
        const checkbox = card.querySelector('.img-checkbox');
        
        if (selectedImages.has(id)) {
            selectedImages.delete(id);
            card.classList.remove('selected');
            checkbox.classList.remove('active');
        } else {
            selectedImages.add(id);
            card.classList.add('selected');
            checkbox.classList.add('active');
        }
        
        updateSelectionUI();
    }
    
    async function downloadSelectedAsZip() {
        if (selectedImages.size === 0) {
            showToast('لم تحدد أي صور', 'error');
            return;
        }
        
        const progressOverlay = document.getElementById('progressOverlay');
        const progressFill = document.getElementById('progressFill');
        const progressTitle = document.getElementById('progressTitle');
        const progressSubtitle = document.getElementById('progressSubtitle');
        
        progressOverlay.classList.add('active');
        progressTitle.innerText = '📦 جاري تجهيز الصور...';
        progressSubtitle.innerText = `0 من ${selectedImages.size}`;
        progressFill.style.width = '0%';
        
        const zip = new JSZip();
        const folder = zip.folder(currentFolderName || 'images');
        const imagesToDownload = currentImages.filter(img => selectedImages.has(img.id));
        
        let completed = 0;
        let failed = 0;
        
        for (const img of imagesToDownload) {
            let success = false;
            try {
                const response = await fetch(`https://drive.google.com/thumbnail?id=${img.id}&sz=w2000`);
                if (response.ok) {
                    const blob = await response.blob();
                    folder.file(img.name, blob);
                    completed++;
                    success = true;
                }
            } catch (e) { }
            
            if (!success) failed++;
            
            const progress = ((completed + failed) / imagesToDownload.length) * 100;
            progressFill.style.width = `${progress}%`;
            progressSubtitle.innerText = `${completed + failed} من ${imagesToDownload.length}`;
        }
        
        progressTitle.innerText = '🗜️ جاري ضغط الملفات...';
        
        try {
            const content = await zip.generateAsync({ type: 'blob' }, (metadata) => {
                progressFill.style.width = `${metadata.percent.toFixed(0)}%`;
            });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `${currentFolderName || 'images'}.zip`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            
            progressOverlay.classList.remove('active');
            
            if (failed > 0) {
                showToast(`تم تنزيل ${completed} صورة (فشل ${failed})`, 'success');
            } else {
                showToast(`تم تنزيل ${completed} صورة بنجاح ✨`, 'success');
            }
            
            selectionMode = false;
            selectedImages.clear();
            updateSelectionUI();
            renderImagesGrid();
            
        } catch (e) {
            progressOverlay.classList.remove('active');
            showToast('حدث خطأ أثناء الضغط', 'error');
        }
    }
    
    function openLightbox(index) {
        lightboxImages = filteredImages;
        lightboxIndex = index;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
        updateLightbox();
        
        // إضافة حالة للتاريخ عشان زر رجوع المتصفح يقفل الـ lightbox
        history.pushState({ type: 'lightbox', path: [...navigationPath] }, '', window.location.href);
    }
    
    function closeLightbox() {
        // نستخدم history.back() بدل التعديل المباشر
        history.back();
    }
    
    function navigateLightbox(direction) {
        const newIndex = lightboxIndex + direction;
        if (newIndex < 0 || newIndex >= lightboxImages.length) return;
        lightboxIndex = newIndex;
        updateLightbox();
    }
    
    function updateLightbox() {
        const img = lightboxImages[lightboxIndex];
        if (!img) return;
        
        const imgEl = document.getElementById('lightboxImg');
        imgEl.style.opacity = '0';
        
        setTimeout(() => {
            imgEl.src = `https://drive.google.com/thumbnail?id=${img.id}&sz=w2000`;
            imgEl.alt = img.name;
            imgEl.onload = () => { imgEl.style.opacity = '1'; };
        }, 150);
        
        document.getElementById('lightboxTitle').innerText = img.name;
        document.getElementById('lightboxCounter').innerText = `${lightboxIndex + 1} / ${lightboxImages.length}`;
        document.getElementById('lightboxDownload').href = `https://drive.google.com/uc?export=download&id=${img.id}`;
        
        document.getElementById('lightboxPrev').disabled = lightboxIndex === 0;
        document.getElementById('lightboxNext').disabled = lightboxIndex === lightboxImages.length - 1;
    }
    
    document.addEventListener('keydown', (e) => {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'Escape') history.back();
        else if (e.key === 'ArrowLeft') navigateLightbox(1);
        else if (e.key === 'ArrowRight') navigateLightbox(-1);
    });
    
    let touchStartX = 0;
    const lightboxEl = document.getElementById('lightbox');
    lightboxEl.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    lightboxEl.addEventListener('touchend', (e) => {
        const diff = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(diff) > 50) {
            navigateLightbox(diff > 0 ? 1 : -1);
        }
    }, { passive: true });
    
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toastIcon');
        const toastMessage = document.getElementById('toastMessage');
        
        toast.className = `toast ${type}`;
        toastMessage.innerText = message;
        
        if (type === 'success') {
            toastIcon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
        } else {
            toastIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
        }
        
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (sidebar.classList.contains('open')) {
            closeSidebar();
        } else {
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    }
    
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.innerText = text;
        return div.innerHTML;
    }
    
    window.addEventListener('resize', () => {
        if (window.innerWidth > 768) closeSidebar();
    });
    
    // ====== Memories System (نظام الذكريات) ======
    const MEMORIES_CACHE_KEY = 'memories_cache_v1';
    const MEMORIES_CACHE_DURATION = 6 * 60 * 60 * 1000; // 6 ساعات
    const DAYS_WINDOW = 14; // نعرض الصور خلال ±14 يوم من تاريخ اليوم في السنوات السابقة
    
    async function loadMemories() {
        const memoriesContent = document.getElementById('memoriesContent');
        const progressEl = document.getElementById('memoriesProgress');
        
        // تحديث التاريخ في الـ hero
        updateMemoriesHeader();
        
        // محاولة القراءة من الكاش أولاً
        const cached = getCachedMemories();
        if (cached) {
            renderMemories(cached);
            return;
        }
        
        try {
            // جلب كل الملفات من كل المجلدات (recursive)
            progressEl.innerText = 'جاري فحص المجلدات الرئيسية...';
            const allImages = await fetchAllImagesRecursive(ROOT_FOLDER_ID, '', progressEl);
            
            if (allImages.length === 0) {
                showNoMemories('لا توجد صور حتى الآن');
                return;
            }
            
            progressEl.innerText = `تم العثور على ${allImages.length} صورة، جاري تحليل التواريخ...`;
            
            // فلترة الصور: نبي الي مر عليها سنة أو أكثر من اليوم
            const memories = filterMemories(allImages);
            
            // حفظ في الكاش
            cacheMemories(memories);
            
            renderMemories(memories);
        } catch (e) {
            console.error(e);
            showNoMemories('حدث خطأ أثناء تحميل الذكريات');
        }
    }
    
    function updateMemoriesHeader() {
        const today = new Date();
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        const dayName = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][today.getDay()];
        
        document.getElementById('memoriesTitle').innerText = `في مثل هذا اليوم`;
        document.getElementById('memoriesSubtitle').innerText = `${dayName}، ${today.getDate()} ${months[today.getMonth()]}`;
    }
    
    async function fetchAllImagesRecursive(folderId, parentPath, progressEl) {
        let allImages = [];
        
        try {
            const files = await fetchAllFilesInFolder(
                folderId,
                'files(id,name,mimeType,createdTime,modifiedTime,imageMediaMetadata)'
            );
            
            const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
            const images = files.filter(f => f.mimeType && f.mimeType.startsWith('image/'));
            
            // إضافة الصور مع معلومات المجلد الأصل
            images.forEach(img => {
                allImages.push({
                    ...img,
                    folderPath: parentPath || 'الرئيسية',
                    parentFolderId: folderId
                });
            });
            
            if (progressEl && images.length > 0) {
                progressEl.innerText = `تم فحص "${parentPath || 'الرئيسية'}" - ${allImages.length} صورة حتى الآن`;
            }
            
            // فحص المجلدات الفرعية بالتوازي (مع حد 3 متزامن)
            const batchSize = 3;
            for (let i = 0; i < folders.length; i += batchSize) {
                const batch = folders.slice(i, i + batchSize);
                const results = await Promise.all(
                    batch.map(f => fetchAllImagesRecursive(
                        f.id, 
                        parentPath ? `${parentPath} › ${f.name}` : f.name,
                        progressEl
                    ))
                );
                results.forEach(r => allImages = allImages.concat(r));
            }
        } catch (e) {
            console.error('Error fetching folder:', folderId, e);
        }
        
        return allImages;
    }
    
    function filterMemories(images) {
        const today = new Date();
        const currentYear = today.getFullYear();
        const todayMonth = today.getMonth();
        const todayDate = today.getDate();
        
        // نحسب "يوم السنة" للتاريخ اليوم (1-365)
        const todayDayOfYear = getDayOfYear(today);
        
        const memories = {};
        
        images.forEach(img => {
            // نحاول نحصل على أفضل تاريخ: EXIF > createdTime
            let imgDate = null;
            
            // أولاً نجرب EXIF (تاريخ التقاط الصورة الحقيقي)
            if (img.imageMediaMetadata && img.imageMediaMetadata.time) {
                // EXIF time format: "2023:05:15 14:30:00"
                const exifTime = img.imageMediaMetadata.time.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1-$2-$3');
                imgDate = new Date(exifTime);
            }
            
            // إذا ما طلع EXIF، نستخدم createdTime
            if (!imgDate || isNaN(imgDate.getTime())) {
                imgDate = new Date(img.createdTime);
            }
            
            if (isNaN(imgDate.getTime())) return;
            
            const imgYear = imgDate.getFullYear();
            
            // شرط: لازم يكون مر عليها سنة أو أكثر
            if (imgYear >= currentYear) return;
            
            // شرط: نفس فترة السنة (نافذة ±14 يوم)
            const imgDayOfYear = getDayOfYear(imgDate);
            const dayDiff = Math.abs(imgDayOfYear - todayDayOfYear);
            
            // نحسب الفرق مع اعتبار التفاف السنة
            const circularDiff = Math.min(dayDiff, 365 - dayDiff);
            
            if (circularDiff <= DAYS_WINDOW) {
                const yearsAgo = currentYear - imgYear;
                if (!memories[yearsAgo]) memories[yearsAgo] = [];
                memories[yearsAgo].push({
                    ...img,
                    imgDate: imgDate.toISOString(),
                    yearsAgo
                });
            }
        });
        
        // ترتيب الصور داخل كل سنة حسب التاريخ (الأقرب لليوم أولاً)
        Object.keys(memories).forEach(year => {
            memories[year].sort((a, b) => {
                const aDiff = Math.abs(getDayOfYear(new Date(a.imgDate)) - todayDayOfYear);
                const bDiff = Math.abs(getDayOfYear(new Date(b.imgDate)) - todayDayOfYear);
                return aDiff - bDiff;
            });
        });
        
        return memories;
    }
    
    function getDayOfYear(date) {
        const start = new Date(date.getFullYear(), 0, 0);
        const diff = date - start;
        return Math.floor(diff / (1000 * 60 * 60 * 24));
    }
    
    function renderMemories(memories) {
        const memoriesContent = document.getElementById('memoriesContent');
        const years = Object.keys(memories).map(Number).sort((a, b) => a - b);
        
        if (years.length === 0) {
            showNoMemories('لا توجد ذكريات من مثل هذا اليوم في السنوات السابقة');
            return;
        }
        
        // تحديث العنوان الفرعي بعدد الذكريات الإجمالي
        const totalMemories = years.reduce((sum, y) => sum + memories[y].length, 0);
        const today = new Date();
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        const dayName = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][today.getDay()];
        document.getElementById('memoriesSubtitle').innerText = 
            `${dayName}، ${today.getDate()} ${months[today.getMonth()]} • ${totalMemories} ذكرى`;
        
        memoriesContent.innerHTML = '';
        
        years.forEach((yearsAgo, groupIdx) => {
            const images = memories[yearsAgo];
            const year = new Date().getFullYear() - yearsAgo;
            
            const group = document.createElement('div');
            group.className = 'memory-year-group';
            group.style.animationDelay = `${groupIdx * 100}ms`;
            
            const yearLabel = yearsAgo === 1 ? 'قبل سنة' : `قبل ${yearsAgo} سنوات`;
            
            group.innerHTML = `
                <div class="memory-year-header">
                    <span class="memory-year-number">${year}</span>
                    <span class="memory-year-label">${yearLabel}</span>
                    <span class="memory-year-count">${images.length} صورة</span>
                </div>
                <div class="images-grid" id="memory-grid-${yearsAgo}"></div>
            `;
            memoriesContent.appendChild(group);
            
            const grid = group.querySelector(`#memory-grid-${yearsAgo}`);
            
            // خزن الصور عشان نقدر نستخدمها في الـ lightbox
            const memoryImages = images.map(img => ({
                id: img.id,
                name: img.name
            }));
            
            images.forEach((p, i) => {
                const imgDate = new Date(p.imgDate);
                const dateStr = `${imgDate.getDate()} ${months[imgDate.getMonth()]}`;
                
                const card = document.createElement('div');
                card.className = 'image-card memory-card';
                card.style.animationDelay = `${Math.min(i * 50, 500)}ms`;
                
                card.innerHTML = `
                    <div class="memory-card-badge">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        ${dateStr}
                    </div>
                    <div class="img-container" onclick='openMemoryLightbox(${JSON.stringify(memoryImages)}, ${i})'>
                        <img src="https://drive.google.com/thumbnail?id=${p.id}&sz=w1200" loading="lazy" alt="${escapeHtml(p.name)}" onload="this.classList.add('loaded')">
                        <div class="img-overlay">
                            <span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"/>
                                </svg>
                                عرض بالحجم الكامل
                            </span>
                        </div>
                    </div>
                    <div class="img-info">
                        <div style="flex:1; min-width:0;">
                            <div class="img-name">${escapeHtml(p.name)}</div>
                            <div class="memory-card-folder">📁 ${escapeHtml(p.folderPath)}</div>
                        </div>
                        <a href="https://drive.google.com/uc?export=download&id=${p.id}" target="_blank" class="btn-download" onclick="event.stopPropagation()">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            حفظ
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    }
    
    function openMemoryLightbox(images, index) {
        lightboxImages = images;
        lightboxIndex = index;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
        updateLightbox();
        history.pushState({ type: 'lightbox', path: [] }, '', window.location.href);
    }
    
    function showNoMemories(message) {
        const memoriesContent = document.getElementById('memoriesContent');
        memoriesContent.innerHTML = `
            <div class="memories-empty">
                <div class="memories-empty-icon">📷</div>
                <div class="memories-empty-title">${message}</div>
                <div class="memories-empty-text">اختر مجلد من القائمة الجانبية لتصفح الصور</div>
            </div>
        `;
    }
    
    // ====== Cache Functions ======
    function cacheMemories(memories) {
        try {
            const cacheData = {
                timestamp: Date.now(),
                date: new Date().toDateString(),
                memories: memories
            };
            localStorage.setItem(MEMORIES_CACHE_KEY, JSON.stringify(cacheData));
        } catch (e) { }
    }
    
    function getCachedMemories() {
        try {
            const raw = localStorage.getItem(MEMORIES_CACHE_KEY);
            if (!raw) return null;
            
            const cacheData = JSON.parse(raw);
            const now = Date.now();
            const today = new Date().toDateString();
            
            // نتأكد من: (1) نفس اليوم (2) مدة الكاش ما انتهت
            if (cacheData.date !== today) return null;
            if (now - cacheData.timestamp > MEMORIES_CACHE_DURATION) return null;
            
            return cacheData.memories;
        } catch (e) {
            return null;
        }
    }
    
    initTheme();
    loadSidebarFolders();
    loadMemories();
    
    // إضافة حالة أولية للتاريخ (الصفحة الرئيسية)
    if (!history.state) {
        history.replaceState({ type: 'home' }, '', window.location.pathname);
    }
</script>
